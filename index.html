:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

.form-grid{display:grid;gap:13px}.form-row label{display:block;font-size:13px;font-weight:800;margin-bottom:6px;color:var(--muted)}.form-row input,.form-row select,.form-row textarea{width:100%;border:1px solid var(--border);background:var(--surface-2);color:var(--text);border-radius:10px;padding:10px}.form-row textarea{min-height:100px;resize:vertical}.help{font-size:12px;color:var(--faint);margin-top:4px}

.toolbar-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:12px}.toolbar-row input{flex:1;min-width:230px;height:38px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);border-radius:10px;padding:0 10px}.toolbar-row button{height:36px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);border-radius:9px;padding:0 10px;font-weight:800}.toolbar-row button.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* v31.1: interfaccia senza icone nelle categorie e nella navigazione */
.header-search span{display:none}.header-search input{padding-left:14px}
.nav-row{gap:0}.nav-icon{display:none!important}
.empty .big{display:none!important}
.category-jump option{font-weight:700}
@media(max-width:700px){.text-btn .btn-label{display:inline}.header-actions .text-btn{white-space:nowrap}}

/* v31.2: UI moderna, categorie non duplicate e liste alfabetiche */
.header{min-height:72px;height:auto;flex-wrap:wrap;padding:12px 16px}
.header-search{max-width:520px;min-width:260px}
.header-actions{flex-wrap:wrap}
.panel-head,.detail-head{flex-wrap:wrap;align-items:flex-start}
.panel-title,.nav-label,.item-title{white-space:normal;overflow:visible;text-overflow:unset;line-height:1.32}
.nav-row,.item-row{justify-content:space-between}
.count{margin-left:8px;align-self:flex-start}
.modern-layout{grid-template-columns:minmax(440px,560px) minmax(0,1fr)}
.category-shell{display:flex;flex-direction:column;height:100%;min-height:0}
.category-header{padding:20px 18px 16px;border-bottom:1px solid var(--border);background:linear-gradient(180deg, rgba(59,130,246,.14), rgba(59,130,246,0))}
.category-heading h2{margin:4px 0 6px;font-size:26px;line-height:1.15}
.category-heading p{margin:0;color:var(--muted)}
.eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.10em;color:var(--faint);font-weight:900}
.category-actions,.subsection-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.subtabs{display:flex;gap:8px;flex-wrap:wrap;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--surface)}
.subtab{display:flex;flex-direction:column;gap:2px;align-items:flex-start;justify-content:center;padding:12px 14px;border:1px solid rgba(96,165,250,.18);background:rgba(29,78,216,.10);color:var(--text);border-radius:14px;min-width:180px;text-align:left}
.subtab small{font-size:12px;color:var(--muted)}
.subtab.active{background:rgba(59,130,246,.22);border-color:rgba(96,165,250,.38);box-shadow:0 0 0 1px rgba(96,165,250,.14) inset}
.subsection-head{padding:18px 18px 12px;display:flex;justify-content:space-between;gap:14px;align-items:flex-end;flex-wrap:wrap}
.subsection-head h3{margin:4px 0 0;font-size:22px;line-height:1.2}
.modern-search{padding:0 18px 10px;border-bottom:0}
.modern-search input{height:42px}
.prompt-grid{padding:6px 18px 18px;gap:12px}
.prompt-grid>.prompt-card{padding:16px;border-radius:16px;border:1px solid rgba(96,165,250,.22);transition:transform .15s ease,border-color .15s ease,box-shadow .15s ease}
.prompt-grid>.prompt-card:nth-child(odd){background:rgba(29,78,216,.22)}
.prompt-grid>.prompt-card:nth-child(even){background:rgba(59,130,246,.12)}
.prompt-grid>.prompt-card:hover{transform:translateY(-1px);border-color:rgba(96,165,250,.46);box-shadow:0 10px 24px rgba(2,6,23,.22)}
.prompt-grid>.prompt-card.active{background:rgba(79,70,229,.22);border-color:rgba(129,140,248,.68);box-shadow:inset 3px 0 0 var(--accent),0 10px 24px rgba(2,6,23,.25)}
.prompt-card-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:8px}

<script>
(()=>{
'use strict';

const VERSION='32.4';
const CLASSIFIER_VERSION='client-first-taxonomy-2026-07-v32.2';
const DB_NAME='PromptStudio_v22';
const DB_VERSION=4;
const DATA_STORE='data';
const BACKUP_STORE='backups';
const TRASH_NAME='Cestino';
const REVIEW_CATEGORY='';
const $=id=>document.getElementById(id);
const uid=()=>crypto.randomUUID?crypto.randomUUID():`${Date.now()}_${Math.random().toString(36).slice(2)}`;
const clone=value=>{try{return structuredClone(value)}catch(_){return JSON.parse(JSON.stringify(value))}};
const escapeHtml=value=>String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const normalize=value=>String(value??'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9._:/\-\s]/g,' ').replace(/\s+/g,' ').trim();
const stripLeadingIcons=value=>String(value??'').replace(/^[\p{Extended_Pictographic}\uFE0F\u200D\s]+/gu,'').trim();
const slug=value=>normalize(value).replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,72)||'generale';
const plain=html=>{const box=document.createElement('div');box.innerHTML=String(html||'');return (box.textContent||'').replace(/\s+/g,' ').trim()};
const formatDate=ts=>ts?new Date(ts).toLocaleString('it-IT',{dateStyle:'short',timeStyle:'short'}):'—';
const wordStats=html=>{const text=plain(html);const words=text?text.split(/\s+/).length:0;return{words,chars:text.length,tokens:Math.ceil(text.length/4)}};
const download=(filename,blob)=>{const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),500)};
const csv=value=>'"'+String(value??'').replace(/"/g,'""').replace(/\r?\n/g,' ')+'"';
const similarity=(a,b)=>{const A=new Set(normalize(a).split(/\s+/).filter(x=>x.length>2));const B=new Set(normalize(b).split(/\s+/).filter(x=>x.length>2));if(!A.size||!B.size)return 0;let intersection=0;A.forEach(x=>{if(B.has(x))intersection++});return intersection/Math.max(A.size,B.size)};

const Toast={
  show(message,type='',delay=3000){const node=document.createElement('div');node.className='toast '+type;node.textContent=message;$('toastWrap').appendChild(node);setTimeout(()=>{node.style.opacity='0';node.style.transform='translateY(8px)';node.style.transition='.25s';setTimeout(()=>node.remove(),260)},delay)}
};
const Loading={show:()=>$('loading').classList.add('show'),hide:()=>$('loading').classList.remove('show')};

class StorageDB{
  constructor(){this.db=null}
  async init(){
    this.db=await new Promise((resolve,reject)=>{
      const request=indexedDB.open(DB_NAME,DB_VERSION);
      request.onerror=()=>reject(request.error);
      request.onupgradeneeded=e=>{
        const db=e.target.result;
        if(!db.objectStoreNames.contains(DATA_STORE))db.createObjectStore(DATA_STORE,{keyPath:'id'});
        if(!db.objectStoreNames.contains(BACKUP_STORE))db.createObjectStore(BACKUP_STORE,{keyPath:'id'});
      };
      request.onsuccess=()=>resolve(request.result);
    });
  }
  get(store,id,fallback=null){return new Promise((resolve,reject)=>{const r=this.db.transaction(store).objectStore(store).get(id);r.onsuccess=()=>resolve(r.result?.data??fallback);r.onerror=()=>reject(r.error)})}
  put(store,id,data,extra={}){return new Promise((resolve,reject)=>{const tx=this.db.transaction(store,'readwrite');tx.objectStore(store).put({id,data:clone(data),...extra});tx.oncomplete=()=>resolve(true);tx.onerror=()=>reject(tx.error)})}
  delete(store,id){return new Promise((resolve,reject)=>{const tx=this.db.transaction(store,'readwrite');tx.objectStore(store).delete(id);tx.oncomplete=()=>resolve(true);tx.onerror=()=>reject(tx.error)})}
  all(store){return new Promise((resolve,reject)=>{const r=this.db.transaction(store).objectStore(store).getAll();r.onsuccess=()=>resolve(r.result||[]);r.onerror=()=>reject(r.error)})}
  async saveBackup(data,label='Backup automatico'){const id='bk_'+Date.now();await this.put(BACKUP_STORE,id,data,{ts:Date.now(),label});const all=(await this.all(BACKUP_STORE)).sort((a,b)=>(b.ts||0)-(a.ts||0));await Promise.all(all.slice(15).map(x=>this.delete(BACKUP_STORE,x.id)));return id}
}

      const recoveredCustom=this.data.filter(cat=>cat.customTaxonomy).map(cat=>({key:`custom_${slug(cat.name)}`,name:cat.name,icon:'',subs:(cat.subcategories||[]).map(sub=>sub.name),custom:true}));

      this.applySettings();this.ensureSelection();this.bind();this.render();this.startAutoBackup();try{const status=this.taxonomyStatus();if(this.data.length&&!status.applied&&!sessionStorage.getItem('ps-v323-plan-shown')){sessionStorage.setItem('ps-v323-plan-shown','1');setTimeout(()=>this.openRecategorize(),250)}}catch(_){}

  migrate(data){
    if(!Array.isArray(data))return[];
    data.forEach(cat=>{
      cat.id=cat.id||uid();cat.name=stripLeadingIcons(cat.name||'Categoria')||'Categoria';cat.icon='';cat.subcategories=Array.isArray(cat.subcategories)?cat.subcategories:[];
      if(Array.isArray(cat.prompts)&&cat.prompts.length){cat.subcategories.unshift({id:uid(),name:'Prompt importati',icon:'',prompts:cat.prompts});cat.prompts=[]}
      cat.subcategories.forEach(sub=>{sub.id=sub.id||uid();sub.name=stripLeadingIcons(sub.name||'Generale')||'Generale';sub.icon='';sub.prompts=Array.isArray(sub.prompts)?sub.prompts:[];sub.prompts.forEach(p=>this.normalizePrompt(p))});
    });return data;
  }
  normalizePrompt(p){p.id=p.id||uid();p.title=String(p.title||p.name||'Prompt');p.description=typeof p.description==='string'?p.description:String(p.description||p.text||p.plainText||'');p.tags=[];p.favorite=!!p.favorite;p.pinned=!!p.pinned;p.copyCount=Number(p.copyCount)||0;p.versions=Array.isArray(p.versions)?p.versions:[];p.related=Array.isArray(p.related)?p.related:[];p.createdAt=Number(p.createdAt)||Date.now();p.updatedAt=Number(p.updatedAt)||Date.now();return p}
  isTrash(cat){return /cestino|🗑️/i.test(String(cat?.name||''))}
  categories(){return this.data.filter(c=>!this.isTrash(c)).sort((a,b)=>a.name.localeCompare(b.name,'it',{sensitivity:'base'}))}
  allPrompts({trash=false,archived=false}={}){const out=[];this.data.forEach(cat=>{if(!trash&&this.isTrash(cat))return;(cat.subcategories||[]).forEach(sub=>(sub.prompts||[]).forEach(prompt=>{if(!archived&&prompt.archived)return;out.push({...prompt,catId:cat.id,subId:sub.id,catName:cat.name,subName:sub.name})}))});return out}
  findCategory(id,data=this.data){return data.find(c=>c.id===id)||null}
  findSub(catId,subId,data=this.data){return this.findCategory(catId,data)?.subcategories?.find(s=>s.id===subId)||null}
  findPrompt(id,data=this.data){for(const cat of data)for(const sub of cat.subcategories||[]){const prompt=(sub.prompts||[]).find(p=>p.id===id);if(prompt)return{cat,sub,prompt}}return null}
  countCategory(cat){return(cat.subcategories||[]).reduce((n,s)=>n+(s.prompts||[]).length,0)}

  extractVariables(html){const text=plain(html);const map=new Map();const patterns=[/\{\{\s*([^{}]+?)\s*\}\}/g,/\[\s*([^\[\]]+?)\s*\]/g,/\(\(\s*([^()]+?)\s*\)\)/g];patterns.forEach(rx=>{let m;while((m=rx.exec(text))){const raw=m[1].trim();let name=raw,options=null,defaultValue='';const idx=raw.indexOf(':');if(idx>-1){name=raw.slice(0,idx).trim();const rest=raw.slice(idx+1).trim();if(rest.includes('|'))options=rest.split('|').map(x=>x.trim()).filter(Boolean);else defaultValue=rest}if(name&&!map.has(name))map.set(name,{name,options,defaultValue})}});return[...map.values()]}

  openSettings(){const body=`<div class="form-grid"><div class="form-row"><label>Tema</label><select id="setTheme"><option value="dark" ${this.settings.theme==='dark'?'selected':''}>Scuro</option><option value="light" ${this.settings.theme==='light'?'selected':''}>Chiaro</option></select></div><div class="form-row"><label>Densità</label><select id="setDensity"><option value="compact" ${this.settings.density==='compact'?'selected':''}>Compatta</option><option value="normal" ${this.settings.density==='normal'?'selected':''}>Normale</option><option value="comfortable" ${this.settings.density==='comfortable'?'selected':''}>Comoda</option></select></div><div class="form-row"><label>Dimensione font</label><input id="setFont" type="number" min="13" max="26" value="${this.settings.fontSize}"></div><div class="form-row"><label>Backup automatico ogni minuti</label><input id="setBackup" type="number" min="2" max="120" value="${this.settings.autoBackupMinutes}"></div></div>`;this.openModal({title:'Impostazioni',body,buttons:[{label:'Chiudi',onClick:()=>this.closeModal()},{label:'Salva',className:'primary',onClick:async()=>{this.settings.theme=$('setTheme').value;this.settings.density=$('setDensity').value;this.settings.fontSize=Math.max(13,Math.min(26,Number($('setFont').value)||16));this.settings.autoBackupMinutes=Math.max(2,Number($('setBackup').value)||10);await this.db.put(DATA_STORE,'settings',this.settings);this.applySettings();this.startAutoBackup();this.closeModal();this.render();Toast.show('Impostazioni salvate.','ok')}}]})}

  exportCategoriesZip(){if(typeof JSZip==='undefined'){Toast.show('Libreria ZIP non disponibile. Controlla la connessione.','err');return}const zip=new JSZip();const folder=zip.folder('prompt-studio-categorie');const manifest=[];this.categories().forEach((cat,index)=>{const name=String(index+1).padStart(2,'0')+'-categoria-'+slug(cat.name)+'.json';folder.file(name,JSON.stringify({type:'prompt-studio-category',version:VERSION,category:cat},null,2));manifest.push({name:cat.name,file:name,prompts:this.countCategory(cat)})});folder.file('manifest.json',JSON.stringify({version:VERSION,exportedAt:new Date().toISOString(),categories:manifest},null,2));zip.generateAsync({type:'blob'}).then(blob=>{download(`prompt-studio-categorie-${new Date().toISOString().slice(0,10)}.zip`,blob);Toast.show('ZIP categorie scaricato.','ok')}).catch(err=>{console.error(err);Toast.show('Errore creazione ZIP.','err')})}

  extractImportedData(parsed){if(Array.isArray(parsed))return parsed;if(Array.isArray(parsed?.data))return parsed.data;if(Array.isArray(parsed?.categories))return parsed.categories;if(parsed?.category)return[parsed.category];if(parsed?.name&&Array.isArray(parsed?.subcategories))return[parsed];return null}
  async importFull(parsed){const imported=this.extractImportedData(parsed);if(!imported){Toast.show('Nessuna categoria valida nel file.','err');return}const mode=await this.formModal('Importa JSON',[{name:'mode',label:'Modalità',type:'select',options:['Aggiungi senza cancellare','Sostituisci tutto']}]);if(!mode)return;if(mode.mode==='Sostituisci tutto'){const ok=await this.confirmModal('Sostituzione completa','Tutte le categorie attuali saranno sostituite.','Sostituisci');if(!ok)return;this.snapshot();this.data=this.migrate(clone(imported));this.recents=Array.isArray(parsed.recents)?parsed.recents:[];if(parsed.settings)this.settings={...this.settings,...parsed.settings};this.customTaxonomy=this.mergeCustomTaxonomy(parsed.customTaxonomy||this.data.filter(cat=>cat.customTaxonomy).map(cat=>({name:cat.name,subs:(cat.subcategories||[]).map(sub=>sub.name),custom:true})))}else{await this.appendCategories(imported);if(Array.isArray(parsed.customTaxonomy))this.customTaxonomy=this.mergeCustomTaxonomy([...this.customTaxonomy,...parsed.customTaxonomy])}await this.persist();this.applySettings();this.closeModal();this.state.view='dashboard';this.render();Toast.show('Importazione completata.','ok')}
  async importCategory(parsed){const imported=this.extractImportedData(parsed);if(!imported?.length){Toast.show('Categoria non valida.','err');return}const source=imported[0];const result=await this.formModal('Importa categoria',[{name:'mode',label:'Azione',type:'select',options:['Nuova categoria','Unisci nella categoria corrente','Sostituisci categoria corrente']}]);if(!result)return;if(result.mode==='Nuova categoria')await this.appendCategories([source]);else if(result.mode==='Unisci nella categoria corrente'){const target=this.findCategory(this.state.catId)||this.categories()[0];if(!target)return;await this.commit(d=>{const t=this.findCategory(target.id,d);const copy=this.migrate([clone(source)])[0];copy.subcategories.forEach(sub=>{sub.id=uid();sub.name=this.uniqueName(sub.name,t.subcategories);sub.prompts.forEach(p=>p.id=uid());t.subcategories.push(sub)})})}else{const target=this.findCategory(this.state.catId)||this.categories()[0];if(!target)return;const ok=await this.confirmModal('Sostituisci categoria',`Sostituire “${target.name}” mantenendo intatte le altre categorie?`,'Sostituisci');if(!ok)return;await this.commit(d=>{const i=d.findIndex(c=>c.id===target.id);const copy=this.migrate([clone(source)])[0];copy.id=target.id;d[i]=copy})}await this.persist();this.closeModal();this.render();Toast.show('Categoria importata.','ok')}
  uniqueName(name,items){const used=new Set(items.map(x=>normalize(x.name)));if(!used.has(normalize(name)))return name;let n=2,candidate=`${name} (Importata)`;while(used.has(normalize(candidate)))candidate=`${name} (Importata ${n++})`;return candidate}
  async appendCategories(categories){this.snapshot();const data=clone(this.data);for(const raw of categories){const cat=this.migrate([clone(raw)])[0];cat.id=uid();cat.name=this.uniqueName(cat.name,data);cat.subcategories.forEach(sub=>{sub.id=uid();sub.prompts.forEach(p=>p.id=uid())});data.push(cat)}this.data=data;await this.persist()}
  openTools(){const body=`<div class="form-grid"><div class="form-row"><label>1. Deduplica nomi categorie e sottocategorie</label><p class="help">Unisce soltanto contenitori con lo stesso nome normalizzato. Non riclassifica semanticamente.</p><button class="text-btn" id="runMergeNames">Analizza e unisci</button></div><div class="form-row"><label>2. Trova prompt duplicati o simili</label><p class="help">Mostra le coppie sospette senza eliminazioni automatiche.</p><button class="text-btn" id="runFindDuplicates">Analizza duplicati</button></div><div class="form-row"><label>3. Ricategorizzazione semantica</label><p class="help">Classifica i prompt in base al risultato richiesto e conserva cliente, canale e tecnologia come tag.</p><button class="text-btn primary" id="runRecategorize">Apri anteprima</button></div><div class="form-row"><label>Rollback ultima ricategorizzazione</label><button class="text-btn" id="runRollback">Ripristina snapshot precedente</button></div></div>`;const modal=this.openModal({title:'Pulizia e organizzazione',subtitle:'Le operazioni sono separate per evitare modifiche opache.',body,buttons:[{label:'Chiudi',onClick:()=>this.closeModal()}]});modal.querySelector('#runMergeNames').onclick=()=>this.mergeDuplicateContainers();modal.querySelector('#runFindDuplicates').onclick=()=>this.findDuplicates();modal.querySelector('#runRecategorize').onclick=()=>this.openRecategorize();modal.querySelector('#runRollback').onclick=()=>this.rollbackTaxonomy()}
  async mergeDuplicateContainers(){const draft=clone(this.data);let mergedCats=0,mergedSubs=0,mergedPrompts=0;const catMap=new Map();for(const cat of [...draft]){if(this.isTrash(cat))continue;const key=normalize(cat.name).replace(/\s*\((?:importata|copia|\d+)\)\s*$/,'');if(!catMap.has(key)){catMap.set(key,cat);continue}const target=catMap.get(key);cat.subcategories.forEach(sub=>target.subcategories.push(sub));draft.splice(draft.indexOf(cat),1);mergedCats++}for(const cat of draft){const subMap=new Map();for(const sub of [...cat.subcategories]){const key=normalize(sub.name).replace(/\s*\((?:importata|copia|\d+)\)\s*$/,'');if(!subMap.has(key)){subMap.set(key,sub);continue}subMap.get(key).prompts.push(...sub.prompts);cat.subcategories.splice(cat.subcategories.indexOf(sub),1);mergedSubs++}for(const sub of cat.subcategories){const seen=new Map();for(const p of [...sub.prompts]){const key=normalize(p.title)+'|'+normalize(plain(p.description));if(!seen.has(key)){seen.set(key,p);continue}const keep=seen.get(key);keep.tags=[...new Set([...(keep.tags||[]),...(p.tags||[])])];keep.copyCount=(keep.copyCount||0)+(p.copyCount||0);keep.favorite=keep.favorite||p.favorite;sub.prompts.splice(sub.prompts.indexOf(p),1);mergedPrompts++}}}const ok=await this.confirmModal('Deduplica contenitori',`Trovate ${mergedCats} categorie duplicate, ${mergedSubs} sottocategorie duplicate e ${mergedPrompts} prompt esatti. Applicare l’unione?`,'Applica');if(!ok)return;this.snapshot();this.data=draft;await this.persist({backup:true});this.closeModal();this.render();Toast.show('Deduplica completata.','ok')}
  findDuplicates(){const all=this.allPrompts();const pairs=[];for(let i=0;i<all.length;i++){for(let j=i+1;j<all.length&&pairs.length<100;j++){const a=all[i],b=all[j];const exact=normalize(a.title)===normalize(b.title)&&normalize(plain(a.description))===normalize(plain(b.description));const score=Math.max(similarity(a.title,b.title),similarity(a.title+' '+plain(a.description).slice(0,500),b.title+' '+plain(b.description).slice(0,500)));if(exact||score>=.78)pairs.push({a,b,score:exact?1:score})}}const rows=pairs.map((p,i)=>`<tr><td>${i+1}</td><td><b>${escapeHtml(p.a.title)}</b><br><small>${escapeHtml(p.a.catName)} › ${escapeHtml(p.a.subName)}</small></td><td><b>${escapeHtml(p.b.title)}</b><br><small>${escapeHtml(p.b.catName)} › ${escapeHtml(p.b.subName)}</small></td><td>${Math.round(p.score*100)}%</td><td><button class="mini-btn" data-open-dup="${p.a.id}">Apri A</button> <button class="mini-btn" data-open-dup="${p.b.id}">Apri B</button></td></tr>`).join('');const modal=this.openModal({title:'Prompt duplicati o simili',subtitle:'Nessun prompt viene eliminato automaticamente.',body:`<div class="table-wrap"><table class="data-table"><thead><tr><th>#</th><th>Prompt A</th><th>Prompt B</th><th>Somiglianza</th><th></th></tr></thead><tbody>${rows||'<tr><td colspan="5">Nessun duplicato evidente.</td></tr>'}</tbody></table></div>`,large:true,buttons:[{label:'Chiudi',onClick:()=>this.closeModal()}]});modal.querySelectorAll('[data-open-dup]').forEach(btn=>btn.onclick=()=>{this.closeModal();this.openPrompt(btn.dataset.openDup)})}
  buildClassificationPlan(){
    return this.allPrompts().map(p=>{
      const entry={catName:p.catName,subName:p.subName,prompt:p};
      const result=TaxonomyEngine.classify(entry);
      const content=plain(p.description||'');
      const tagText=(p.tags||[]).join(' ');
      const current=`${p.catName} › ${p.subName}`;
      const searchText=normalize([
        p.title,content,tagText,current,result.catName,result.sub,(result.reasons||[]).join(' ')
      ].join(' '));
      return{
        promptId:p.id,title:p.title,current,catName:p.catName,subName:p.subName,
        excerpt:content.slice(0,260),searchText,result,selected:false,
        proposedCat:result.catName,proposedSub:result.sub
      };
    });
  }
  openRecategorize(){this.closeModal();Loading.show();setTimeout(()=>{try{this.showClassificationPlan(this.buildClassificationPlan())}finally{Loading.hide()}},20)}
  showClassificationPlan(plan){
    let searchQuery='',addingCategory=false;
    let taxonomyList=this.taxonomyOptions();
    let targetCategory=taxonomyList[0]?.name||'';
    let targetSubcategory=taxonomyList[0]?.subs?.[0]||'Generale';
    plan.forEach(row=>row.selected=false);

    const modal=this.openModal({
      title:'Riorganizzazione completa delle categorie',
      subtitle:'Cerca i prompt, selezionali e spostali subito nella categoria scelta.',
      body:'<div id="simpleClassificationBody"></div>',
      large:true,
      buttons:[{label:'Chiudi',onClick:()=>this.closeModal()}]
    });
    const root=modal.querySelector('#simpleClassificationBody');
    const taxonomy=()=>this.taxonomyOptions();
    const getTax=name=>taxonomy().find(item=>normalize(item.name)===normalize(name))||taxonomy()[0]||{name:'Generale',subs:['Generale'],custom:true};
    const categoryOptions=selected=>taxonomy().map(item=>`<option value="${escapeHtml(item.name)}" ${normalize(item.name)===normalize(selected)?'selected':''}>${escapeHtml(item.name)}</option>`).join('');
    const selectedRows=()=>plan.filter(row=>row.selected);
    const matchingRows=()=>{
      const phrase=normalize(searchQuery);
      const terms=phrase.split(/\s+/).filter(term=>term.length>1);
      return plan.map((row,index)=>({row,index})).filter(({row})=>{
        if(!terms.length)return true;
        const haystack=row.searchText||normalize([row.title,row.excerpt,row.current,row.proposedCat,row.proposedSub].join(' '));
        return terms.every(term=>haystack.includes(term));
      }).sort((a,b)=>a.row.title.localeCompare(b.row.title,'it',{sensitivity:'base'}));
    };
    const updateSelectionUi=()=>{
      const selected=selectedRows().length;
      const counter=root.querySelector('#simpleSelectedCounter');
      const moveButton=root.querySelector('#moveSelectedNow');
      if(counter)counter.textContent=`${selected} selezionati`;
      if(moveButton)moveButton.disabled=selected===0;
      const visible=matchingRows();
      const selectAll=root.querySelector('#simpleSelectAllCheck');
      if(selectAll)selectAll.checked=visible.length>0&&visible.every(({row})=>row.selected);
    };
    const render=()=>{
      taxonomyList=taxonomy();
      if(!taxonomyList.some(item=>normalize(item.name)===normalize(targetCategory))){
        targetCategory=taxonomyList[0]?.name||'';
        targetSubcategory=taxonomyList[0]?.subs?.[0]||'Generale';
      }
      const targetTax=getTax(targetCategory);
      if(!targetTax.subs.some(name=>normalize(name)===normalize(targetSubcategory)))targetSubcategory=targetTax.subs[0]||'Generale';
      const matches=matchingRows();
      const shown=matches.slice(0,500);
      root.innerHTML=`<div class="simple-organizer">
        <div class="simple-organizer-intro">
          <div><h3>Sposta più prompt insieme</h3><p>1. Cerca i prompt. 2. Selezionali. 3. Scegli la destinazione. 4. Premi il pulsante blu. Lo spostamento viene salvato immediatamente.</p></div>
          <span class="simple-counter" id="simpleSelectedCounter">${selectedRows().length} selezionati</span>
        </div>
        <div class="simple-fields">
          <div class="simple-field"><label for="simplePromptSearch">Cerca nei titoli e nei contenuti</label><input id="simplePromptSearch" type="search" value="${escapeHtml(searchQuery)}" placeholder="Es. yoga, SEO locale, ricette Instagram"></div>
          <div class="simple-field"><label for="simpleTargetCategory">Categoria di destinazione A–Z</label><select id="simpleTargetCategory">${categoryOptions(targetCategory)}</select></div>
          <div class="simple-field"><label for="simpleTargetSubcategory">Sottocategoria</label><select id="simpleTargetSubcategory">${targetTax.subs.map(name=>`<option ${normalize(name)===normalize(targetSubcategory)?'selected':''}>${escapeHtml(name)}</option>`).join('')}</select></div>
          <button class="simple-add-category" id="simpleAddCategory">+ Aggiungi categoria</button>
        </div>
        <div class="simple-create-category ${addingCategory?'':'hidden'}" id="simpleCreateCategory">
          <div class="simple-field"><label for="simpleNewCategory">Nome categoria</label><input id="simpleNewCategory" maxlength="80" placeholder="Es. E-commerce"></div>
          <div class="simple-field"><label for="simpleNewSubcategory">Prima sottocategoria</label><input id="simpleNewSubcategory" maxlength="80" value="Generale"></div>
          <button class="confirm" id="simpleSaveCategory">Crea</button>
          <button id="simpleCancelCategory">Annulla</button>
        </div>
        <div class="simple-actions">
          <button id="simpleSelectResults">Seleziona tutti i risultati</button>
          <button id="simpleClearSelection">Deseleziona tutti</button>
          <span class="simple-help">${matches.length} prompt trovati${matches.length>shown.length?` · primi ${shown.length} mostrati`:''}</span>
          <button class="move-selected" id="moveSelectedNow" ${selectedRows().length?'':'disabled'}>Sposta i selezionati nella categoria assegnata</button>
        </div>
        <div class="simple-results" id="simpleResults">${shown.length?`<table class="data-table"><thead><tr><th class="checkbox-cell"><input id="simpleSelectAllCheck" type="checkbox" aria-label="Seleziona tutti i risultati"></th><th>Prompt</th><th>Categoria attuale</th></tr></thead><tbody>${shown.map(({row,index})=>`<tr><td class="checkbox-cell"><input type="checkbox" data-simple-select="${index}" ${row.selected?'checked':''} aria-label="Seleziona ${escapeHtml(row.title)}"></td><td><div class="simple-result-title">${escapeHtml(row.title)}</div>${row.excerpt?`<div class="simple-result-excerpt">${escapeHtml(row.excerpt)}</div>`:''}</td><td>${escapeHtml(row.current)}</td></tr>`).join('')}</tbody></table>`:'<div class="simple-empty">Nessun prompt trovato. Prova con una parola più breve o diversa.</div>'}</div>
      </div>`;

      const search=root.querySelector('#simplePromptSearch');
      search.oninput=event=>{
        searchQuery=event.target.value;
        const caret=event.target.selectionStart??searchQuery.length;
        render();
        requestAnimationFrame(()=>{const next=root.querySelector('#simplePromptSearch');if(next){next.focus();try{next.setSelectionRange(caret,caret)}catch(_){}}});
      };
      const categorySelect=root.querySelector('#simpleTargetCategory');
      const subcategorySelect=root.querySelector('#simpleTargetSubcategory');
      categorySelect.onchange=()=>{
        targetCategory=categorySelect.value;
        const currentTax=getTax(targetCategory);
        targetSubcategory=currentTax.subs[0]||'Generale';
        subcategorySelect.innerHTML=currentTax.subs.map(name=>`<option>${escapeHtml(name)}</option>`).join('');
        subcategorySelect.value=targetSubcategory;
      };
      subcategorySelect.onchange=()=>{targetSubcategory=subcategorySelect.value};
      root.querySelector('#simpleAddCategory').onclick=()=>{addingCategory=!addingCategory;render();if(addingCategory)setTimeout(()=>root.querySelector('#simpleNewCategory')?.focus(),30)};
      root.querySelector('#simpleCancelCategory').onclick=()=>{addingCategory=false;render()};
      root.querySelector('#simpleSaveCategory').onclick=async()=>{
        const name=stripLeadingIcons(root.querySelector('#simpleNewCategory')?.value||'').trim();
        const subName=stripLeadingIcons(root.querySelector('#simpleNewSubcategory')?.value||'Generale').trim()||'Generale';
        if(!name){Toast.show('Inserisci il nome della categoria.','err');root.querySelector('#simpleNewCategory')?.focus();return}
        const existing=taxonomy().find(item=>normalize(item.name)===normalize(name));
        if(existing){targetCategory=existing.name;targetSubcategory=existing.subs[0]||'Generale';addingCategory=false;Toast.show('La categoria esiste già ed è stata selezionata.','ok');render();return}
        this.customTaxonomy=this.mergeCustomTaxonomy([...this.customTaxonomy,{key:`custom_${slug(name)}`,name,icon:'',subs:[subName],custom:true}]);
        await this.saveCustomTaxonomy();
        targetCategory=name;targetSubcategory=subName;addingCategory=false;
        Toast.show(`Categoria “${name}” creata e selezionata.`,'ok');render();
      };
      root.querySelectorAll('[data-simple-select]').forEach(check=>check.onchange=()=>{plan[+check.dataset.simpleSelect].selected=check.checked;updateSelectionUi()});
      const allCheck=root.querySelector('#simpleSelectAllCheck');
      if(allCheck){allCheck.checked=matches.length>0&&matches.every(({row})=>row.selected);allCheck.onchange=()=>{matches.forEach(({row})=>row.selected=allCheck.checked);render()}};
      root.querySelector('#simpleSelectResults').onclick=()=>{if(!matches.length){Toast.show('Nessun risultato da selezionare.','err');return}matches.forEach(({row})=>row.selected=true);render()};
      root.querySelector('#simpleClearSelection').onclick=()=>{plan.forEach(row=>row.selected=false);render()};
      root.querySelector('#moveSelectedNow').onclick=async event=>{
        const selected=selectedRows();
        if(!selected.length){Toast.show('Seleziona almeno un prompt.','err');return}
        const button=event.currentTarget;button.disabled=true;button.textContent='Spostamento in corso…';
        Loading.show();
        try{
          const moved=await this.moveSelectedPromptsToCategory(selected.map(row=>row.promptId),targetCategory,targetSubcategory);
          if(!moved){Toast.show('I prompt selezionati sono già nella categoria scelta.','err');return}
          plan=this.buildClassificationPlan();
          this.render();
          Toast.show(`${moved} prompt spostati in ${targetCategory} › ${targetSubcategory}.`,'ok',5000);
          render();
        }catch(error){console.error(error);Toast.show('Errore durante lo spostamento dei prompt.','err',6000);render()}
        finally{Loading.hide()}
      };
      updateSelectionUi();
    };
    render();
  }
  async moveSelectedPromptsToCategory(promptIds,categoryName,subcategoryName){
    const ids=[...new Set((promptIds||[]).filter(Boolean))];
    if(!ids.length)return 0;
    const tax=this.taxonomyOptions().find(item=>normalize(item.name)===normalize(categoryName));
    const cleanCategory=stripLeadingIcons(tax?.name||categoryName||'').trim();
    const cleanSubcategory=stripLeadingIcons(subcategoryName||tax?.subs?.[0]||'Generale').trim()||'Generale';
    if(!cleanCategory)throw new Error('Categoria di destinazione non valida');
    await this.db.saveBackup(this.data,`Prima dello spostamento di ${ids.length} prompt`);
    let moved=0;
    await this.commit(draft=>{
      let targetCat=draft.find(cat=>!this.isTrash(cat)&&normalize(cat.name)===normalize(cleanCategory));
      if(!targetCat){targetCat={id:uid(),name:cleanCategory,icon:'',customTaxonomy:!!tax?.custom,subcategories:[]};draft.push(targetCat)}
      let targetSub=(targetCat.subcategories||[]).find(sub=>normalize(sub.name)===normalize(cleanSubcategory));
      if(!targetSub){targetSub={id:uid(),name:cleanSubcategory,icon:'',prompts:[]};targetCat.subcategories.push(targetSub)}
      ids.forEach(id=>{
        const found=this.findPrompt(id,draft);
        if(!found||this.isTrash(found.cat))return;
        if(found.cat.id===targetCat.id&&found.sub.id===targetSub.id)return;
        const index=found.sub.prompts.findIndex(prompt=>prompt.id===id);if(index<0)return;
        const [prompt]=found.sub.prompts.splice(index,1);
        prompt.originHistory=Array.isArray(prompt.originHistory)?prompt.originHistory:[];
        prompt.originHistory.push({category:stripLeadingIcons(found.cat.name),subcategory:stripLeadingIcons(found.sub.name),at:Date.now(),action:'manual-move'});
        prompt.classificationVersion=CLASSIFIER_VERSION;
        prompt.classificationScore=100;
        prompt.classificationReasons=['spostamento manuale nella categoria assegnata'];
        prompt.classifiedAt=Date.now();
        prompt.updatedAt=Date.now();
        targetSub.prompts.push(prompt);moved++;
      });
    },{render:false});
    return moved;
  }

  exportPlanCsv(plan){const header=['Prompt','Origine','Categoria proposta','Sottocategoria proposta','Confidenza','Motivazioni'];const rows=plan.map(r=>[r.title,r.current,r.proposedCat,r.proposedSub,r.result.confidence,(r.result.reasons||[]).join('; ')]);download('anteprima-categorizzazione-v32.4.csv',new Blob([[header,...rows].map(row=>row.map(csv).join(',')).join('\n')],{type:'text/csv;charset=utf-8'}))}
  splitLargeSubcategories(categories){for(const cat of categories){const result=[];for(const sub of cat.subcategories){if(sub.prompts.length<=50){result.push(sub);continue}const sorted=sub.prompts.slice().sort((a,b)=>a.title.localeCompare(b.title,'it'));for(let i=0;i<sorted.length;i+=35){const chunk=sorted.slice(i,i+35);const first=(normalize(chunk[0]?.title)[0]||'#').toUpperCase();const last=(normalize(chunk.at(-1)?.title)[0]||'#').toUpperCase();result.push({id:uid(),name:`${sub.name} · ${first}–${last}`,icon:sub.icon||'',prompts:chunk})}}cat.subcategories=result}}
  async applyClassification(plan){
    if(!plan.length){Toast.show('Nessun prompt da classificare.','err');return}
    const classificationTaxonomy=this.taxonomyOptions();const ok=await this.confirmModal('Applica la nuova categorizzazione',`Riorganizzare tutti i ${plan.length} prompt nelle ${classificationTaxonomy.length} categorie e creare un backup di rollback?`,'Applica');if(!ok)return;
    Loading.show();
    try{
      await this.db.put(DATA_STORE,'taxonomyRollbackV323',{data:this.data,recents:this.recents,customTaxonomy:this.customTaxonomy,ts:Date.now()});
      await this.db.saveBackup(this.data,'Prima della categorizzazione v32.3');
      const planMap=new Map(plan.map(r=>[r.promptId,r]));
      const newCats=classificationTaxonomy.map(t=>({id:uid(),name:t.name,icon:'',customTaxonomy:!!t.custom,subcategories:t.subs.map(name=>({id:uid(),name,icon:'',prompts:[]}))}));
      const targetMap=new Map();newCats.forEach(c=>c.subcategories.forEach(sub=>targetMap.set(normalize(c.name)+'|'+normalize(sub.name),sub)));
      const entries=[];this.data.forEach(cat=>{if(this.isTrash(cat))return;(cat.subcategories||[]).forEach(sub=>(sub.prompts||[]).forEach(prompt=>entries.push({cat,sub,prompt})))});
      for(const entry of entries){
        const row=planMap.get(entry.prompt.id)||(()=>{const result=TaxonomyEngine.classify({catName:entry.cat.name,subName:entry.sub.name,prompt:entry.prompt});return{result,proposedCat:result.catName,proposedSub:result.sub}})();
        const tax=classificationTaxonomy.find(x=>x.name===row.proposedCat)||classificationTaxonomy.find(x=>x.key===row.result.key)||classificationTaxonomy[0];
        const subName=tax.subs.includes(row.proposedSub)?row.proposedSub:tax.subs[0];
        const target=targetMap.get(normalize(tax.name)+'|'+normalize(subName));
        const p=clone(entry.prompt);p.originCategory=p.originCategory||stripLeadingIcons(entry.cat.name);p.originSubcategory=p.originSubcategory||stripLeadingIcons(entry.sub.name);p.originHistory=Array.isArray(p.originHistory)?p.originHistory:[];p.originHistory.push({category:stripLeadingIcons(entry.cat.name),subcategory:stripLeadingIcons(entry.sub.name),at:Date.now()});p.classificationVersion=CLASSIFIER_VERSION;p.classificationScore=row.result.confidence;p.classificationReasons=row.result.reasons;p.classifiedAt=Date.now();p.tags=[];target.prompts.push(p);
      }
      newCats.forEach(cat=>cat.subcategories.forEach(sub=>{const seen=new Map();sub.prompts=sub.prompts.filter(p=>{const key=normalize(p.title)+'|'+normalize(plain(p.description));if(!seen.has(key)){seen.set(key,p);return true}const keep=seen.get(key);keep.tags=[...new Set([...(keep.tags||[]),...(p.tags||[])])];keep.copyCount=(keep.copyCount||0)+(p.copyCount||0);keep.favorite=keep.favorite||p.favorite;keep.pinned=keep.pinned||p.pinned;return false})}));
      newCats.forEach(cat=>cat.subcategories=cat.subcategories.filter(sub=>sub.prompts.length));
      const trash=this.data.find(c=>this.isTrash(c));if(trash){const copy=clone(trash);copy.name='Cestino';copy.icon='';copy.subcategories.forEach(s=>s.icon='');newCats.push(copy)}
      this.snapshot();this.data=newCats.filter(c=>this.isTrash(c)||this.countCategory(c)>0);this.state={...this.state,view:'dashboard',catId:null,subId:null,promptId:null};await this.persist();this.closeModal();this.render();this.exportClassificationReport(plan,plan.map(r=>r.promptId));Toast.show('Categorie riorganizzate: ogni prompt è stato assegnato alla propria area.','ok',5000);
    }finally{Loading.hide()}
  }
  exportClassificationReport(plan,ids){const set=new Set(ids);const rows=plan.filter(r=>set.has(r.promptId)).map(r=>[r.title,r.current,`${r.proposedCat} › ${r.proposedSub}`,r.result.confidence,(r.result.reasons||[]).join('; ')]);const text=[['Prompt','Origine','Destinazione','Confidenza','Motivazioni'],...rows].map(row=>row.map(csv).join(',')).join('\n');download('report-categorizzazione-v32.4.csv',new Blob([text],{type:'text/csv;charset=utf-8'}))}
  async rollbackTaxonomy(){const rollback=await this.db.get(DATA_STORE,'taxonomyRollbackV323',null)||await this.db.get(DATA_STORE,'taxonomyRollbackV322',null)||await this.db.get(DATA_STORE,'taxonomyRollbackV320',null)||await this.db.get(DATA_STORE,'taxonomyRollbackV31',null);if(!rollback?.data){Toast.show('Nessun rollback disponibile.','err');return}const ok=await this.confirmModal('Rollback tassonomia','Ripristinare i dati precedenti all’ultima ricategorizzazione?','Ripristina');if(!ok)return;this.snapshot();this.data=this.migrate(clone(rollback.data));this.recents=rollback.recents||[];this.customTaxonomy=this.mergeCustomTaxonomy(rollback.customTaxonomy||this.data.filter(cat=>cat.customTaxonomy).map(cat=>({name:cat.name,subs:(cat.subcategories||[]).map(sub=>sub.name),custom:true})));await this.persist();this.closeModal();this.state.view='dashboard';this.render();Toast.show('Rollback completato.','ok')}
}

const app=new PromptStudioApp();window.PromptStudio=app;app.init();
})();
</script>
