<!doctype html>
<html lang="it" data-theme="dark" data-density="normal">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prompt Studio v31.1 Categorie pulite</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --bg:#07101f;--surface:#0b1629;--surface-2:#10203a;--surface-3:#172b49;
  --border:rgba(191,219,254,.16);--border-strong:rgba(191,219,254,.30);
  --text:#f8fbff;--muted:#a9b8cf;--faint:#6f819d;--accent:#7c6fff;--accent-2:#4f46e5;
  --success:#22c55e;--warning:#f59e0b;--danger:#ef4444;--info:#38bdf8;
  --radius-sm:8px;--radius:13px;--radius-lg:20px;--shadow:0 18px 48px rgba(0,0,0,.28);
  --font-size:16px;--item-pad:11px 12px;--gap:8px;--sidebar:300px;--subbar:300px;
}
[data-theme="light"]{
  --bg:#f3f6fb;--surface:#fff;--surface-2:#eef3fb;--surface-3:#e2ebf8;
  --border:rgba(15,23,42,.10);--border-strong:rgba(15,23,42,.18);
  --text:#111827;--muted:#475569;--faint:#8290a5;--shadow:0 18px 48px rgba(15,23,42,.12);
}
[data-density="compact"]{--item-pad:7px 10px;--gap:5px}
[data-density="comfortable"]{--item-pad:15px 15px;--gap:11px}
*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden}
body{font-family:Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:var(--font-size);line-height:1.5}
button,input,select,textarea{font:inherit}button{cursor:pointer}button:disabled{opacity:.45;cursor:not-allowed}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:99px}
.app{height:100%;display:flex;flex-direction:column}
.header{height:66px;flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);z-index:20}
.brand{display:flex;align-items:center;gap:9px;font-weight:900;font-size:21px;white-space:nowrap}.brand-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 18px var(--accent)}
.version{font-size:11px;background:var(--accent);color:#fff;border-radius:99px;padding:2px 7px;font-weight:800}
.header-search{position:relative;flex:1;max-width:460px}.header-search span{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--faint)}
.header-search input{width:100%;height:42px;padding:0 38px;border:1px solid var(--border);border-radius:99px;background:var(--surface-2);color:var(--text)}
.header-search .clear-search{position:absolute;right:6px;top:5px;width:32px;height:32px;border:0;background:transparent;color:var(--muted);border-radius:50%}
.category-jump{min-width:220px;max-width:330px;height:42px;border:1px solid var(--border);border-radius:11px;background:var(--surface-2);color:var(--text);padding:0 10px}
.header-actions{margin-left:auto;display:flex;align-items:center;gap:6px}.icon-btn,.text-btn{border:1px solid transparent;background:transparent;color:var(--muted);border-radius:11px;min-height:40px;display:inline-flex;align-items:center;justify-content:center;gap:7px;font-weight:800}
.icon-btn{width:42px;font-size:18px}.text-btn{padding:0 12px}.icon-btn:hover,.text-btn:hover{background:var(--surface-2);color:var(--text);border-color:var(--border)}
.text-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}.text-btn.primary:hover{background:var(--accent-2)}
.main{flex:1;min-height:0;overflow:hidden}.layout-3{height:100%;display:grid;grid-template-columns:var(--sidebar) var(--subbar) minmax(0,1fr)}.layout-2{height:100%;display:grid;grid-template-columns:400px minmax(0,1fr)}.layout-1{height:100%;display:block}
.panel{min-height:0;display:flex;flex-direction:column;background:var(--surface);border-right:1px solid var(--border);overflow:hidden}.panel:last-child{border-right:0}.detail-panel{background:var(--bg)}
.panel-head{min-height:64px;padding:12px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);background:var(--surface)}
.panel-title{font-size:15px;text-transform:uppercase;letter-spacing:.06em;font-weight:900;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.count{margin-left:auto;background:rgba(124,111,255,.15);color:#a69fff;border:1px solid rgba(124,111,255,.22);border-radius:99px;padding:3px 8px;font-size:12px;font-weight:900;white-space:nowrap}
.mini-btn{border:1px solid var(--border);background:var(--surface-2);color:var(--text);border-radius:9px;min-width:34px;height:34px;padding:0 9px;font-weight:900}.mini-btn:hover{background:var(--surface-3)}.mini-btn.danger{color:#fca5a5}.mini-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.panel-search{padding:9px;border-bottom:1px solid var(--border)}.panel-search input{width:100%;height:38px;border:1px solid var(--border);border-radius:99px;background:var(--surface-2);color:var(--text);padding:0 12px}
.list{flex:1;min-height:0;overflow:auto;padding:9px;display:flex;flex-direction:column;gap:var(--gap)}.sub-list{max-height:34%;min-height:120px;overflow:auto;padding:9px;display:flex;flex-direction:column;gap:var(--gap);border-bottom:1px solid var(--border)}.prompt-list{flex:1;min-height:0;overflow:auto;padding:9px;display:flex;flex-direction:column;gap:var(--gap)}
.nav-section-title{font-size:11px;text-transform:uppercase;letter-spacing:.10em;color:var(--faint);font-weight:900;padding:12px 9px 5px}.nav-item,.list-item{border:1px solid transparent;background:transparent;color:var(--text);border-radius:var(--radius);padding:var(--item-pad);text-align:left;width:100%;transition:.15s ease;position:relative}.nav-item:hover,.list-item:hover{background:var(--surface-2);border-color:var(--border)}.nav-item.active,.list-item.active{background:rgba(124,111,255,.16);border-color:var(--accent);box-shadow:inset 3px 0 0 var(--accent)}
.nav-row,.item-row{display:flex;align-items:flex-start;gap:9px}.nav-icon{width:22px;text-align:center;flex:0 0 auto}.nav-label,.item-title{font-weight:800;min-width:0;overflow:hidden;text-overflow:ellipsis}.nav-meta,.item-meta,.item-desc{color:var(--muted);font-size:12px;margin-top:3px}.item-desc{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.item-actions{display:flex;gap:4px;opacity:0;margin-left:auto}.list-item:hover .item-actions{opacity:1}.item-actions button{width:28px;height:28px;border:1px solid var(--border);background:var(--surface-3);color:var(--text);border-radius:7px}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}.badge{display:inline-flex;align-items:center;gap:4px;border-radius:99px;padding:2px 7px;border:1px solid var(--border);background:var(--surface-2);font-size:11px;font-weight:800;color:var(--muted)}.badge.good{color:#86efac;background:rgba(34,197,94,.10);border-color:rgba(34,197,94,.25)}.badge.warn{color:#fcd34d;background:rgba(245,158,11,.10);border-color:rgba(245,158,11,.25)}.badge.bad{color:#fca5a5;background:rgba(239,68,68,.10);border-color:rgba(239,68,68,.25)}
.empty{margin:auto;padding:30px 20px;text-align:center;color:var(--muted);max-width:420px}.empty .big{font-size:36px;opacity:.65}.empty strong{display:block;color:var(--text);margin:8px 0}.empty p{margin:0;font-size:14px}
.detail{height:100%;display:flex;flex-direction:column;min-height:0}.detail-head{min-height:62px;padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:var(--surface)}.detail-head h3{margin:0;font-size:14px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}.detail-actions{margin-left:auto;display:flex;gap:5px;flex-wrap:wrap}.detail-actions button{border:1px solid var(--border);background:var(--surface-2);color:var(--text);border-radius:9px;height:36px;padding:0 10px;font-weight:800}.detail-actions button:hover{background:var(--surface-3)}.detail-actions .danger{color:#fca5a5}
.breadcrumb{padding:8px 17px;background:var(--surface-2);border-bottom:1px solid var(--border);font-size:13px;color:var(--muted)}.breadcrumb button{border:0;background:transparent;color:#9f98ff;padding:0;font-weight:800}
.title-row{padding:16px 18px 10px;background:var(--bg);display:flex;align-items:flex-start;gap:10px}.title-row h1{font-size:28px;line-height:1.18;margin:0;min-width:0}.title-row .spacer{flex:1}.meta-row{display:flex;gap:7px;flex-wrap:wrap;padding:0 18px 12px;background:var(--bg)}
.tags-row{padding:10px 18px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:8px;flex-wrap:wrap}.tag{border:1px solid var(--border-strong);background:var(--surface-2);color:var(--text);border-radius:99px;padding:4px 9px;font-size:12px;font-weight:800}.tag button{border:0;background:transparent;color:var(--muted);padding:0 0 0 5px}.tag-input{display:flex;gap:6px;flex:1;min-width:220px}.tag-input input{flex:1;min-width:120px;height:34px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);border-radius:9px;padding:0 10px}
.editor-toolbar{display:none;padding:7px 14px;gap:5px;flex-wrap:wrap;background:var(--surface);border-bottom:1px solid var(--border)}.editor-toolbar.show{display:flex}.editor-toolbar button{width:34px;height:32px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);border-radius:8px;font-weight:900}.editor-toolbar .save-edit{width:auto;padding:0 14px;background:var(--accent);color:#fff;border-color:var(--accent);margin-left:auto}
.variables{display:none;padding:10px 18px;background:var(--surface);border-bottom:1px solid var(--border)}.variables.show{display:block}.variables h4{margin:0 0 8px;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}.var-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px}.var-field{display:grid;grid-template-columns:minmax(90px,auto) 1fr;gap:8px;align-items:center}.var-field label{font-size:12px;font-weight:800;color:var(--muted);overflow:hidden;text-overflow:ellipsis}.var-field input,.var-field select{height:35px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);border-radius:8px;padding:0 8px}
.editor{flex:1;min-height:0;overflow:auto;padding:24px 28px 100px;font-size:var(--font-size);line-height:1.82;color:var(--text)}.editor[contenteditable="true"]{background:var(--surface-2);box-shadow:inset 3px 0 0 var(--accent)}.editor a{color:#60a5fa}.editor img{max-width:100%;height:auto;border-radius:10px}.editor:empty:before{content:'Prompt vuoto';color:var(--faint)}
.detail-foot{height:38px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:var(--surface);border-top:1px solid var(--border);color:var(--muted);font-size:12px}
.dashboard{height:100%;overflow:auto;padding:20px;background:var(--bg)}.dash-hero{display:flex;align-items:center;justify-content:space-between;gap:18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:15px;box-shadow:var(--shadow)}.dash-hero h1{margin:0;font-size:28px}.dash-hero p{margin:5px 0 0;color:var(--muted)}.dash-actions{display:flex;gap:8px;flex-wrap:wrap}
.taxonomy-banner{display:flex;align-items:center;justify-content:space-between;gap:14px;border:1px solid rgba(245,158,11,.30);background:rgba(245,158,11,.10);border-radius:var(--radius);padding:13px 15px;margin-bottom:15px}.taxonomy-banner.applied{border-color:rgba(34,197,94,.30);background:rgba(34,197,94,.10)}.taxonomy-banner strong{display:block}.taxonomy-banner p{margin:2px 0 0;color:var(--muted);font-size:13px}
.stats-grid{display:grid;grid-template-columns:repeat(5,minmax(140px,1fr));gap:12px;margin-bottom:15px}.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}.stat-card b{display:block;font-size:32px}.stat-card span{color:var(--muted);font-weight:800;font-size:13px}
.dashboard-grid{display:grid;grid-template-columns:repeat(5,minmax(220px,1fr));gap:12px}.dash-column{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}.dash-column-head{padding:14px;border-bottom:1px solid var(--border);background:var(--surface-2)}.dash-column-head h3{margin:0;font-size:17px}.dash-column-head p{margin:4px 0 0;color:var(--muted);font-size:12px}.dash-column-list{padding:9px;display:grid;gap:8px}.dash-card{border:1px solid var(--border);background:var(--surface-2);border-radius:11px;padding:10px;cursor:pointer}.dash-card:hover{border-color:var(--accent)}.dash-card strong{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.dash-card p{margin:4px 0 0;color:var(--muted);font-size:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.dash-column select{width:calc(100% - 18px);height:38px;margin:0 9px 10px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);border-radius:9px;padding:0 8px}
.modal-layer{position:fixed;inset:0;background:rgba(0,0,0,.68);backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;padding:20px;z-index:1000}.modal-layer.show{display:flex}.modal{width:min(650px,96vw);max-height:92vh;overflow:auto;background:var(--surface);border:1px solid var(--border-strong);border-radius:22px;box-shadow:0 30px 90px rgba(0,0,0,.55)}.modal.large{width:min(1250px,98vw)}.modal-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px}.modal-head h2{margin:0;font-size:21px}.modal-head p{margin:4px 0 0;color:var(--muted);font-size:13px}.modal-close{margin-left:auto;border:0;background:transparent;color:var(--muted);font-size:22px}.modal-body{padding:18px 20px}.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap}.modal-foot button{border:1px solid var(--border);background:var(--surface-2);color:var(--text);border-radius:10px;min-height:39px;padding:0 13px;font-weight:800}.modal-foot button.primary{background:var(--accent);border-color:var(--accent);color:#fff}.modal-foot button.danger{background:var(--danger);border-color:var(--danger);color:#fff}.modal-foot button.safe{background:var(--success);border-color:var(--success);color:#fff}
.form-grid{display:grid;gap:13px}.form-row label{display:block;font-size:13px;font-weight:800;margin-bottom:6px;color:var(--muted)}.form-row input,.form-row select,.form-row textarea{width:100%;border:1px solid var(--border);background:var(--surface-2);color:var(--text);border-radius:10px;padding:10px}.form-row textarea{min-height:100px;resize:vertical}.help{font-size:12px;color:var(--faint);margin-top:4px}
.table-wrap{overflow:auto;border:1px solid var(--border);border-radius:12px;max-height:60vh}.data-table{width:100%;border-collapse:collapse;font-size:13px}.data-table th{position:sticky;top:0;background:var(--surface-3);z-index:1;text-align:left;padding:10px;border-bottom:1px solid var(--border);white-space:nowrap}.data-table td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:top}.data-table tr:hover td{background:rgba(124,111,255,.05)}.data-table select{max-width:230px;background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px}.confidence{display:inline-block;border-radius:99px;padding:3px 7px;font-weight:900}.confidence.high{background:rgba(34,197,94,.14);color:#86efac}.confidence.medium{background:rgba(245,158,11,.14);color:#fcd34d}.confidence.low{background:rgba(239,68,68,.14);color:#fca5a5}
.toolbar-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:12px}.toolbar-row input{flex:1;min-width:230px;height:38px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);border-radius:10px;padding:0 10px}.toolbar-row button{height:36px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);border-radius:9px;padding:0 10px;font-weight:800}.toolbar-row button.active{background:var(--accent);border-color:var(--accent);color:#fff}
.summary-grid{display:grid;grid-template-columns:repeat(6,minmax(100px,1fr));gap:8px;margin-bottom:13px}.summary-box{background:var(--surface-2);border:1px solid var(--border);border-radius:11px;padding:10px}.summary-box b{display:block;font-size:22px}.summary-box span{font-size:11px;color:var(--muted);font-weight:800}
.toast-wrap{position:fixed;right:18px;bottom:18px;z-index:2000;display:grid;gap:8px}.toast{background:var(--surface);border:1px solid var(--border-strong);border-left:4px solid var(--accent);border-radius:11px;padding:11px 14px;box-shadow:var(--shadow);max-width:360px}.toast.ok{border-left-color:var(--success)}.toast.err{border-left-color:var(--danger)}
.loading{position:fixed;inset:0;background:rgba(0,0,0,.34);display:none;align-items:center;justify-content:center;z-index:1500}.loading.show{display:flex}.spinner{width:42px;height:42px;border:3px solid rgba(255,255,255,.18);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}
@media(max-width:1450px){.dashboard-grid{grid-template-columns:repeat(3,minmax(220px,1fr))}.stats-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:1050px){html,body{overflow:auto}.app{min-height:100%;height:auto}.header{height:auto;flex-wrap:wrap;position:sticky;top:0}.header-search{order:3;flex-basis:100%;max-width:none}.category-jump{flex:1}.main{overflow:visible}.layout-3,.layout-2{display:block;height:auto}.panel{min-height:50vh;border-right:0;border-bottom:1px solid var(--border)}.detail{min-height:70vh}.dashboard-grid{grid-template-columns:repeat(2,1fr)}.stats-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.header{padding:9px}.brand{font-size:18px}.header-actions{width:100%;overflow:auto;margin-left:0}.text-btn .btn-label{display:none}.category-jump{max-width:none}.dashboard{padding:12px}.dash-hero{align-items:flex-start;flex-direction:column}.dashboard-grid,.stats-grid{grid-template-columns:1fr}.summary-grid{grid-template-columns:repeat(2,1fr)}.editor{padding:18px 16px 90px}.title-row h1{font-size:22px}.modal-layer{padding:8px}.modal-body{padding:14px}}

/* v31.1: interfaccia senza icone nelle categorie e nella navigazione */
.header-search span{display:none}.header-search input{padding-left:14px}
.nav-row{gap:0}.nav-icon{display:none!important}
.empty .big{display:none!important}
.category-jump option{font-weight:700}
@media(max-width:700px){.text-btn .btn-label{display:inline}.header-actions .text-btn{white-space:nowrap}}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="brand"><span class="brand-dot"></span>Prompt Studio <span class="version">v31.1</span></div>
    <div class="header-search"><span>⌕</span><input id="globalSearch" type="search" placeholder="Cerca prompt, contenuti e tag…"><button id="clearSearch" class="clear-search" aria-label="Cancella ricerca">×</button></div>
    <select id="categoryJump" class="category-jump" aria-label="Navigazione"></select>
    <div class="header-actions">
      <button class="text-btn" data-action="nav" data-view="dashboard">Dashboard</button>
      <button class="text-btn primary" data-action="open-recategorize">Riorganizza categorie</button>
      <button class="text-btn" data-action="open-tools">Pulizia</button>
      <button class="text-btn" data-action="open-backup">Backup</button>
      <button class="text-btn" data-action="toggle-theme">Tema</button>
      <button class="text-btn" data-action="open-settings">Impostazioni</button>
    </div>
  </header>
  <main id="main" class="main"></main>
</div>
<div id="modalLayer" class="modal-layer" role="dialog" aria-modal="true"></div>
<div id="toastWrap" class="toast-wrap" aria-live="polite"></div>
<div id="loading" class="loading"><div class="spinner"></div></div>
<input id="fileInput" type="file" class="hidden" accept=".json">
<input id="imageInput" type="file" class="hidden" accept="image/*">
<script>
(()=>{
'use strict';

const VERSION='31.1';
const CLASSIFIER_VERSION='functional-taxonomy-2026-07-v31.1';
const DB_NAME='PromptStudio_v22';
const DB_VERSION=4;
const DATA_STORE='data';
const BACKUP_STORE='backups';
const TRASH_NAME='Cestino';
const REVIEW_CATEGORY='';
const $=id=>document.getElementById(id);
const uid=()=>crypto.randomUUID?crypto.randomUUID():`${Date.now()}_${Math.random().toString(36).slice(2)}`;
const clone=value=>{try{return structuredClone(value)}catch(_){return JSON.parse(JSON.stringify(value))}};
const escapeHtml=value=>String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const normalize=value=>String(value??'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9._:/\-\s]/g,' ').replace(/\s+/g,' ').trim();
const stripLeadingIcons=value=>String(value??'').replace(/^[\p{Extended_Pictographic}\uFE0F\u200D\s]+/gu,'').trim();
const slug=value=>normalize(value).replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,72)||'generale';
const plain=html=>{const box=document.createElement('div');box.innerHTML=String(html||'');return (box.textContent||'').replace(/\s+/g,' ').trim()};
const formatDate=ts=>ts?new Date(ts).toLocaleString('it-IT',{dateStyle:'short',timeStyle:'short'}):'—';
const wordStats=html=>{const text=plain(html);const words=text?text.split(/\s+/).length:0;return{words,chars:text.length,tokens:Math.ceil(text.length/4)}};
const download=(filename,blob)=>{const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),500)};
const csv=value=>'"'+String(value??'').replace(/"/g,'""').replace(/\r?\n/g,' ')+'"';

class StorageDB{
  constructor(){this.db=null}
  async init(){
    this.db=await new Promise((resolve,reject)=>{
      const request=indexedDB.open(DB_NAME,DB_VERSION);
      request.onerror=()=>reject(request.error);
      request.onupgradeneeded=e=>{
        const db=e.target.result;
        if(!db.objectStoreNames.contains(DATA_STORE))db.createObjectStore(DATA_STORE,{keyPath:'id'});
        if(!db.objectStoreNames.contains(BACKUP_STORE))db.createObjectStore(BACKUP_STORE,{keyPath:'id'});
      };
      request.onsuccess=()=>resolve(request.result);
    });
  }
  get(store,id,fallback=null){return new Promise((resolve,reject)=>{const r=this.db.transaction(store).objectStore(store).get(id);r.onsuccess=()=>resolve(r.result?.data??fallback);r.onerror=()=>reject(r.error)})}
  put(store,id,data,extra={}){return new Promise((resolve,reject)=>{const tx=this.db.transaction(store,'readwrite');tx.objectStore(store).put({id,data:clone(data),...extra});tx.oncomplete=()=>resolve(true);tx.onerror=()=>reject(tx.error)})}
  delete(store,id){return new Promise((resolve,reject)=>{const tx=this.db.transaction(store,'readwrite');tx.objectStore(store).delete(id);tx.oncomplete=()=>resolve(true);tx.onerror=()=>reject(tx.error)})}
  all(store){return new Promise((resolve,reject)=>{const r=this.db.transaction(store).objectStore(store).getAll();r.onsuccess=()=>resolve(r.result||[]);r.onerror=()=>reject(r.error)})}
  async saveBackup(data,label='Backup automatico'){const id='bk_'+Date.now();await this.put(BACKUP_STORE,id,data,{ts:Date.now(),label});const all=(await this.all(BACKUP_STORE)).sort((a,b)=>(b.ts||0)-(a.ts||0));await Promise.all(all.slice(15).map(x=>this.delete(BACKUP_STORE,x.id)));return id}
}

class TaxonomyEngine{
  static clientTags(text,source=''){
    const value=normalize(text+' '+source);const tags=[];
    const rules=[
      ['client:roberto-zanoni',/roberto\s*zanoni|robertozanoni\.it|tool\.zanoni/],
      ['client:galbiati-dental-group',/galbiati\s*dental/],

      ['client:trova-esperti-digitali',/trova\s*esperti\s*digitali|trovaespertidigitali/],
      ['client:zirafa',/zirafa|studiodentisticozirafa|metodo\s*sato/]
    ];
    rules.forEach(([tag,rx])=>{if(rx.test(value))tags.push(tag)});return[...new Set(tags)];
  }
  static generatedTags(text,source=''){
    const value=normalize(text);const tags=[];const add=(tag,rx)=>{if(rx.test(value))tags.push(tag)};
    add('channel:instagram',/instagram|reel|storie|stories/);add('channel:linkedin',/linkedin/);add('channel:youtube',/youtube|shorts?/);add('channel:facebook',/facebook/);
    add('tool:elementor',/elementor/);add('tool:wordpress',/wordpress|gutenberg|woocommerce/);add('tool:search-console',/search console|gsc/);add('tool:canva',/canva/);
    add('format:html',/\bhtml\b/);add('format:json',/\bjson\b/);add('format:csv',/\bcsv\b/);add('format:excel',/excel|xlsx/);add('format:pdf',/\bpdf\b/);
    add('task:audit',/audit|analizza|valuta|verifica/);add('task:creazione',/crea|genera|scrivi|sviluppa/);add('task:ottimizzazione',/ottimizza|migliora|correggi|riscrivi/);
    return[...new Set([...this.clientTags(value,source),...tags])];
  }
  static sourceKey(source){
    const s=normalize(source);
    if(/seo|serp|keyword|search console|internal linking|topical/.test(s))return'seo';
    if(/copy|scrittura|contenut|articol|landing|email/.test(s))return'content';
    if(/social|instagram|facebook|linkedin|youtube|community/.test(s))return'social';
    if(/wordpress|elementor|web design|ux web/.test(s))return'wordpress';
    if(/codice|sviluppo|web app|software|html|javascript/.test(s))return'code';
    if(/grafica|immagin|branding|foto|thumbnail/.test(s))return'graphics';
    if(/video|animazione|audio|reel/.test(s))return'video';
    if(/marketing|business|growth|funnel|buyer persona/.test(s))return'marketing';
    if(/ai|prompt engineering|gpt|gem|chatbot/.test(s))return'ai';
    if(/produttiv|dati|document|excel|csv|workflow|sop/.test(s))return'productivity';
    return'';
  }
  static classify(entry){
    const p=entry.prompt||{};
    const title=String(p.title||p.name||'');
    const body=plain(p.description||p.text||p.plainText||'');
    const tags=(p.tags||[]).join(' ');
    const source=[entry.catName,entry.subName,p.originCategory,p.originSubcategory].filter(Boolean).join(' ');
    const text=normalize([title,body,tags].join(' '));
    const sourceText=normalize(source);const hit=rx=>rx.test(text);const scores={};const reasons={};
    TAXONOMY.forEach(x=>{scores[x.key]=0;reasons[x.key]=[]});
    const add=(key,points,reason)=>{scores[key]+=points;if(reason&&!reasons[key].includes(reason))reasons[key].push(reason)};
    const sourceKey=this.sourceKey(sourceText);if(sourceKey)add(sourceKey,38,'coerenza con la categoria di origine');

    const videoOutput=hit(/(?:crea|genera|realizza|trasforma|anima|monta|produci).{0,70}(?:video|reel|short|animazione|voice.?over)|(?:storyboard|script video|prompt video|video ai|google flow|veo|sora)/);
    const imageOutput=hit(/(?:crea|genera|realizza|modifica|trasforma|ritocca).{0,70}(?:immagine|foto|fotografia|logo|thumbnail|miniatura|mockup|illustrazione|grafica|visual)|prompt immagine|still life|food photography/);
    const wpWork=hit(/wordpress|elementor|gutenberg|woocommerce|wpcode|shortcode|functions\.php|tema wordpress|plugin wordpress|widget elementor/);
    const codeWork=hit(/(?:crea|sviluppa|implementa|correggi|ripara|debug|refactor|audit).{0,90}(?:web app|applicazione|software|plugin|estensione|script|codice|html|css|javascript|typescript|php|python|database|api)|indexeddb|localstorage|github|deploy/);
    const seoWork=hit(/\bseo\b|keyword|search intent|serp|content gap|competitor seo|search console|\bgsc\b|schema|dati strutturati|internal linking|link interni|topical authority|local seo|indicizzazione|crawl|canonical|robots|sitemap|core web vitals|meta description|title seo|rank math|google business profile|pagina orfana/);
    const socialWork=hit(/social media|piano editoriale|calendario editoriale|caption|hashtag|carosello|post instagram|post facebook|post linkedin|community|instagram|facebook|linkedin|youtube channel/);
    const marketingWork=hit(/marketing|buyer persona|segmentazione|posizionamento|proposta di valore|funnel|customer journey|pricing|monetizzazione|business model|analisi di mercato|market research|growth|validazione|cro|conversion rate|offerta commerciale|analisi concorrenza/);
    const aiMeta=hit(/prompt engineering|meta.?prompt|migliora.{0,35}prompt|ottimizza.{0,35}prompt|crea.{0,35}(?:un )?prompt|system prompt|custom gpt|custom gem|gem personalizzat|gpt personalizzat|agente ai|chatbot|guardrail|anti.?allucinazioni|second brain|operating system ai|orchestrazione ai|istruzioni personalizzate|llm/);
    const productivityWork=hit(/workflow|\bsop\b|procedura operativa|scadenzario|agenda|meeting|verbale|riunione|checklist|pianificazione|excel|xlsx|csv|pdf|documento|file|backup|importazione|esportazione|tabella dati|studio|apprendimento|quiz/);
    const writingWork=hit(/(?:scrivi|crea|genera|riscrivi|correggi|migliora|umanizza).{0,75}(?:articolo|guida|landing|pagina servizio|testo|copy|email|newsletter|headline|cta|descrizione|comunicato|storia)|copywriting|storytelling|newsletter|email marketing/);

    if(videoOutput)add('video',115,'il risultato richiesto è un video o contenuto audio-video');
    if(imageOutput)add('graphics',115,'il risultato richiesto è un’immagine o una grafica');
    if(wpWork)add('wordpress',105,'attività riferita a WordPress, Elementor o web design');
    if(codeWork)add('code',100,'sviluppo o modifica di codice, app o software');
    if(wpWork&&codeWork){add('wordpress',34,'il codice è destinato a WordPress o Elementor');scores.code=Math.max(0,scores.code-18)}
    if(seoWork)add('seo',105,'argomento o attività SEO esplicita');
    if(socialWork)add('social',92,'contenuto o strategia per social media');
    if(marketingWork)add('marketing',88,'strategia marketing o business');
    if(aiMeta)add('ai',90,'progettazione o controllo di prompt e sistemi AI');
    if(productivityWork)add('productivity',82,'documenti, dati o organizzazione operativa');
    if(writingWork)add('content',76,'produzione o riscrittura di contenuti testuali');

    if(hit(/articolo seo|contenuto seo|landing seo|pagina seo|copy seo/)){add('seo',35,'il contenuto ha finalità SEO');scores.content=Math.max(0,scores.content-12)}
    if(videoOutput){scores.social=Math.max(0,scores.social-45);scores.graphics=Math.max(0,scores.graphics-20)}
    if(imageOutput){scores.social=Math.max(0,scores.social-40);scores.content=Math.max(0,scores.content-15)}
    if(wpWork&&seoWork&&hit(/audit|ottimizza|schema|indicizzazione|search console|seo tecnica/))add('seo',28,'la finalità prevalente è SEO');
    if(wpWork&&writingWork&&!hit(/codice|widget|plugin|tema|debug|responsive|performance/))add('content',24,'WordPress è solo il contenitore del testo');

    let ranked=Object.entries(scores).sort((a,b)=>b[1]-a[1]);let [key,score]=ranked[0];let second=ranked[1]||['',0];
    if(score<35){
      if(sourceKey){key=sourceKey;score=Math.max(score,48);reasons[key].push('assegnazione basata sulla provenienza del prompt')}
      else if(writingWork){key='content';score=45}
      else if(productivityWork){key='productivity';score=45}
      else if(aiMeta){key='ai';score=45}
      else{key='content';score=36;reasons.content.push('contenuto generico assegnato alla categoria editoriale')}
      ranked=Object.entries(scores).sort((a,b)=>b[1]-a[1]);second=ranked.find(x=>x[0]!==key)||['',0];
    }
    const category=TAX_BY_KEY.get(key);const sub=this.subcategory(key,text+' '+sourceText);
    const margin=Math.max(0,score-second[1]);let confidence=Math.round(Math.min(98,Math.max(58,58+margin*.45+Math.min(18,score/8))));
    if(sourceKey===key)confidence=Math.min(98,confidence+6);if(margin<15)confidence=Math.min(78,confidence);
    return{key,catName:category.name,icon:'',sub,score,confidence,level:confidence>=85?'high':confidence>=68?'medium':'low',reasons:(reasons[key]||[]).slice(0,4),alternative:second[1]>25?{key:second[0],score:second[1]}:null,tags:this.generatedTags(text,source)};
  }

class PromptStudioApp{
  constructor(){
    this.db=new StorageDB();
    this.data=[];this.recents=[];this.snippets=[];this.presets={};
    this.settings={theme:'dark',density:'normal',fontSize:16,autoBackupMinutes:10};
    this.state={view:'dashboard',catId:null,subId:null,promptId:null,search:'',promptFilter:'',tag:null,editing:false};
    this.undo=[];this.redo=[];this.saveTimer=null;this.backupTimer=null;this.fileMode='full-import';
  }
  async init(){
    Loading.show();
    try{
      await this.db.init();
      this.data=this.migrate(await this.db.get(DATA_STORE,'main',[]));
      this.recents=await this.db.get(DATA_STORE,'recents',[]);
      this.snippets=await this.db.get(DATA_STORE,'snippets',[]);
      this.presets=await this.db.get(DATA_STORE,'varPresets',{});
      this.settings={...this.settings,...(await this.db.get(DATA_STORE,'settings',{}))};
      this.applySettings();this.ensureSelection();this.bind();this.render();this.startAutoBackup();try{const status=this.taxonomyStatus();if(this.data.length&&!status.applied&&!sessionStorage.getItem('ps-v311-plan-shown')){sessionStorage.setItem('ps-v311-plan-shown','1');setTimeout(()=>this.openRecategorize(),250)}}catch(_){}
    }catch(error){console.error(error);Toast.show('Errore durante il caricamento dei dati.','err',6000)}finally{Loading.hide()}
  }
  migrate(data){
    if(!Array.isArray(data))return[];
    data.forEach(cat=>{
      cat.id=cat.id||uid();cat.name=stripLeadingIcons(cat.name||'Categoria')||'Categoria';cat.icon='';cat.subcategories=Array.isArray(cat.subcategories)?cat.subcategories:[];
      if(Array.isArray(cat.prompts)&&cat.prompts.length){cat.subcategories.unshift({id:uid(),name:'Prompt importati',icon:'',prompts:cat.prompts});cat.prompts=[]}
      cat.subcategories.forEach(sub=>{sub.id=sub.id||uid();sub.name=stripLeadingIcons(sub.name||'Generale')||'Generale';sub.icon='';sub.prompts=Array.isArray(sub.prompts)?sub.prompts:[];sub.prompts.forEach(p=>this.normalizePrompt(p))});
    });return data;
  }
  normalizePrompt(p){p.id=p.id||uid();p.title=String(p.title||p.name||'Prompt');p.description=typeof p.description==='string'?p.description:String(p.description||p.text||p.plainText||'');p.tags=Array.isArray(p.tags)?p.tags:(p.tags?[String(p.tags)]:[]);p.favorite=!!p.favorite;p.pinned=!!p.pinned;p.copyCount=Number(p.copyCount)||0;p.versions=Array.isArray(p.versions)?p.versions:[];p.related=Array.isArray(p.related)?p.related:[];p.createdAt=Number(p.createdAt)||Date.now();p.updatedAt=Number(p.updatedAt)||Date.now();return p}
  isTrash(cat){return /cestino|🗑️/i.test(String(cat?.name||''))}
  categories(){return this.data.filter(c=>!this.isTrash(c)).sort((a,b)=>a.name.localeCompare(b.name,'it',{sensitivity:'base'}))}
  allPrompts({trash=false,archived=false}={}){const out=[];this.data.forEach(cat=>{if(!trash&&this.isTrash(cat))return;(cat.subcategories||[]).forEach(sub=>(sub.prompts||[]).forEach(prompt=>{if(!archived&&prompt.archived)return;out.push({...prompt,catId:cat.id,subId:sub.id,catName:cat.name,subName:sub.name})}))});return out}
  findCategory(id,data=this.data){return data.find(c=>c.id===id)||null}
  findSub(catId,subId,data=this.data){return this.findCategory(catId,data)?.subcategories?.find(s=>s.id===subId)||null}
  findPrompt(id,data=this.data){for(const cat of data)for(const sub of cat.subcategories||[]){const prompt=(sub.prompts||[]).find(p=>p.id===id);if(prompt)return{cat,sub,prompt}}return null}
  countCategory(cat){return(cat.subcategories||[]).reduce((n,s)=>n+(s.prompts||[]).length,0)}
  ensureSelection(){
    if(['dashboard','all','favorites','recents','tags','trash','search'].includes(this.state.view))return;
    let cat=this.findCategory(this.state.catId);if(!cat||this.isTrash(cat))cat=this.categories()[0];
    if(!cat){this.state={...this.state,view:'dashboard',catId:null,subId:null,promptId:null};return}
    this.state.catId=cat.id;let sub=cat.subcategories.find(s=>s.id===this.state.subId)||cat.subcategories[0];this.state.subId=sub?.id||null;let prompt=sub?.prompts.find(p=>p.id===this.state.promptId)||sub?.prompts[0];this.state.promptId=prompt?.id||null;
  }
  snapshot(){this.undo.push(clone({data:this.data,recents:this.recents,state:this.state}));if(this.undo.length>35)this.undo.shift();this.redo=[]}
  async persist({backup=false}={}){await Promise.all([this.db.put(DATA_STORE,'main',this.data),this.db.put(DATA_STORE,'recents',this.recents)]);if(backup)await this.db.saveBackup(this.data,'Backup manuale')}
  async commit(mutator,{render=true,backup=false}={}){this.snapshot();const draft=clone(this.data);await mutator(draft);this.data=this.migrate(draft);this.ensureSelection();await this.persist({backup});if(render)this.render()}
  async undoAction(){if(!this.undo.length)return;this.redo.push(clone({data:this.data,recents:this.recents,state:this.state}));const prev=this.undo.pop();this.data=prev.data;this.recents=prev.recents;this.state=prev.state;await this.persist();this.render();Toast.show('Operazione annullata.','ok')}

  handleChange(e){if(e.target.matches('[data-dash-select]')){const id=e.target.value;if(id)this.openPrompt(id)}if(e.target.id==='tagFilter'){this.state.tag=e.target.value;this.render()}}

  handleKeys(e){

  renderJump(){const select=$('categoryJump');const views=[['dashboard','Dashboard'],['all','Tutti'],['favorites','Preferiti'],['recents','Recenti'],['tags','Tag'],['trash','Cestino']];select.innerHTML=views.map(([v,l])=>`<option value="view:${v}">${l}</option>`).join('')+'<option disabled>──────────</option>'+this.categories().map(c=>`<option value="cat:${c.id}">${escapeHtml(stripLeadingIcons(c.name))} · ${this.countCategory(c)} prompt</option>`).join('');select.value=this.state.view==='library'&&this.state.catId?`cat:${this.state.catId}`:`view:${this.state.view}`}

  extractVariables(html){const text=plain(html);const map=new Map();const patterns=[/\{\{\s*([^{}]+?)\s*\}\}/g,/\[\s*([^\[\]]+?)\s*\]/g,/\(\(\s*([^()]+?)\s*\)\)/g];patterns.forEach(rx=>{let m;while((m=rx.exec(text))){const raw=m[1].trim();let name=raw,options=null,defaultValue='';const idx=raw.indexOf(':');if(idx>-1){name=raw.slice(0,idx).trim();const rest=raw.slice(idx+1).trim();if(rest.includes('|'))options=rest.split('|').map(x=>x.trim()).filter(Boolean);else defaultValue=rest}if(name&&!map.has(name))map.set(name,{name,options,defaultValue})}});return[...map.values()]}

  async movePrompt(){const found=this.findPrompt(this.state.promptId);if(!found)return;const categories=this.categories();const result=await this.formModal('Sposta prompt',[{name:'category',label:'Categoria',type:'select',options:categories.map(c=>c.name),value:found.cat.name},{name:'subcategory',label:'Sottocategoria destinazione',type:'select',options:(categories[0]?.subcategories||[]).map(s=>s.name)}],{dynamicCategories:categories});if(!result)return;const targetCat=categories.find(c=>c.name===result.category);const targetSub=targetCat?.subcategories.find(s=>s.name===result.subcategory);if(!targetSub){Toast.show('Destinazione non valida.','err');return}await this.commit(d=>{const src=this.findPrompt(found.prompt.id,d);const index=src.sub.prompts.findIndex(p=>p.id===found.prompt.id);const [moved]=src.sub.prompts.splice(index,1);this.findSub(targetCat.id,targetSub.id,d).prompts.push(moved)});this.state.catId=targetCat.id;this.state.subId=targetSub.id;this.render();Toast.show('Prompt spostato.','ok')}

  openSettings(){const body=`<div class="form-grid"><div class="form-row"><label>Tema</label><select id="setTheme"><option value="dark" ${this.settings.theme==='dark'?'selected':''}>Scuro</option><option value="light" ${this.settings.theme==='light'?'selected':''}>Chiaro</option></select></div><div class="form-row"><label>Densità</label><select id="setDensity"><option value="compact" ${this.settings.density==='compact'?'selected':''}>Compatta</option><option value="normal" ${this.settings.density==='normal'?'selected':''}>Normale</option><option value="comfortable" ${this.settings.density==='comfortable'?'selected':''}>Comoda</option></select></div><div class="form-row"><label>Dimensione font</label><input id="setFont" type="number" min="13" max="26" value="${this.settings.fontSize}"></div><div class="form-row"><label>Backup automatico ogni minuti</label><input id="setBackup" type="number" min="2" max="120" value="${this.settings.autoBackupMinutes}"></div></div>`;this.openModal({title:'Impostazioni',body,buttons:[{label:'Chiudi',onClick:()=>this.closeModal()},{label:'Salva',className:'primary',onClick:async()=>{this.settings.theme=$('setTheme').value;this.settings.density=$('setDensity').value;this.settings.fontSize=Math.max(13,Math.min(26,Number($('setFont').value)||16));this.settings.autoBackupMinutes=Math.max(2,Number($('setBackup').value)||10);await this.db.put(DATA_STORE,'settings',this.settings);this.applySettings();this.startAutoBackup();this.closeModal();this.render();Toast.show('Impostazioni salvate.','ok')}}]})}

  extractImportedData(parsed){if(Array.isArray(parsed))return parsed;if(Array.isArray(parsed?.data))return parsed.data;if(Array.isArray(parsed?.categories))return parsed.categories;if(parsed?.category)return[parsed.category];if(parsed?.name&&Array.isArray(parsed?.subcategories))return[parsed];return null}
  async importFull(parsed){const imported=this.extractImportedData(parsed);if(!imported){Toast.show('Nessuna categoria valida nel file.','err');return}const mode=await this.formModal('Importa JSON',[{name:'mode',label:'Modalità',type:'select',options:['Aggiungi senza cancellare','Sostituisci tutto']}]);if(!mode)return;if(mode.mode==='Sostituisci tutto'){const ok=await this.confirmModal('Sostituzione completa','Tutte le categorie attuali saranno sostituite.','Sostituisci');if(!ok)return;this.snapshot();this.data=this.migrate(clone(imported));this.recents=Array.isArray(parsed.recents)?parsed.recents:[];if(parsed.settings)this.settings={...this.settings,...parsed.settings}}else{await this.appendCategories(imported)}await this.persist();this.applySettings();this.closeModal();this.state.view='dashboard';this.render();Toast.show('Importazione completata.','ok')}
  async importCategory(parsed){const imported=this.extractImportedData(parsed);if(!imported?.length){Toast.show('Categoria non valida.','err');return}const source=imported[0];const result=await this.formModal('Importa categoria',[{name:'mode',label:'Azione',type:'select',options:['Nuova categoria','Unisci nella categoria corrente','Sostituisci categoria corrente']}]);if(!result)return;if(result.mode==='Nuova categoria')await this.appendCategories([source]);else if(result.mode==='Unisci nella categoria corrente'){const target=this.findCategory(this.state.catId)||this.categories()[0];if(!target)return;await this.commit(d=>{const t=this.findCategory(target.id,d);const copy=this.migrate([clone(source)])[0];copy.subcategories.forEach(sub=>{sub.id=uid();sub.name=this.uniqueName(sub.name,t.subcategories);sub.prompts.forEach(p=>p.id=uid());t.subcategories.push(sub)})})}else{const target=this.findCategory(this.state.catId)||this.categories()[0];if(!target)return;const ok=await this.confirmModal('Sostituisci categoria',`Sostituire “${target.name}” mantenendo intatte le altre categorie?`,'Sostituisci');if(!ok)return;await this.commit(d=>{const i=d.findIndex(c=>c.id===target.id);const copy=this.migrate([clone(source)])[0];copy.id=target.id;d[i]=copy})}await this.persist();this.closeModal();this.render();Toast.show('Categoria importata.','ok')}
  uniqueName(name,items){const used=new Set(items.map(x=>normalize(x.name)));if(!used.has(normalize(name)))return name;let n=2,candidate=`${name} (Importata)`;while(used.has(normalize(candidate)))candidate=`${name} (Importata ${n++})`;return candidate}
  async appendCategories(categories){this.snapshot();const data=clone(this.data);for(const raw of categories){const cat=this.migrate([clone(raw)])[0];cat.id=uid();cat.name=this.uniqueName(cat.name,data);cat.subcategories.forEach(sub=>{sub.id=uid();sub.prompts.forEach(p=>p.id=uid())});data.push(cat)}this.data=data;await this.persist()}
  openTools(){const body=`<div class="form-grid"><div class="form-row"><label>1. Deduplica nomi categorie e sottocategorie</label><p class="help">Unisce soltanto contenitori con lo stesso nome normalizzato. Non riclassifica semanticamente.</p><button class="text-btn" id="runMergeNames">Analizza e unisci</button></div><div class="form-row"><label>2. Trova prompt duplicati o simili</label><p class="help">Mostra le coppie sospette senza eliminazioni automatiche.</p><button class="text-btn" id="runFindDuplicates">Analizza duplicati</button></div><div class="form-row"><label>3. Ricategorizzazione semantica</label><p class="help">Classifica i prompt in base al risultato richiesto e conserva cliente, canale e tecnologia come tag.</p><button class="text-btn primary" id="runRecategorize">Apri anteprima</button></div><div class="form-row"><label>Rollback ultima ricategorizzazione</label><button class="text-btn" id="runRollback">Ripristina snapshot precedente</button></div></div>`;const modal=this.openModal({title:'Pulizia e organizzazione',subtitle:'Le operazioni sono separate per evitare modifiche opache.',body,buttons:[{label:'Chiudi',onClick:()=>this.closeModal()}]});modal.querySelector('#runMergeNames').onclick=()=>this.mergeDuplicateContainers();modal.querySelector('#runFindDuplicates').onclick=()=>this.findDuplicates();modal.querySelector('#runRecategorize').onclick=()=>this.openRecategorize();modal.querySelector('#runRollback').onclick=()=>this.rollbackTaxonomy()}
  async mergeDuplicateContainers(){const draft=clone(this.data);let mergedCats=0,mergedSubs=0,mergedPrompts=0;const catMap=new Map();for(const cat of [...draft]){if(this.isTrash(cat))continue;const key=normalize(cat.name).replace(/\s*\((?:importata|copia|\d+)\)\s*$/,'');if(!catMap.has(key)){catMap.set(key,cat);continue}const target=catMap.get(key);cat.subcategories.forEach(sub=>target.subcategories.push(sub));draft.splice(draft.indexOf(cat),1);mergedCats++}for(const cat of draft){const subMap=new Map();for(const sub of [...cat.subcategories]){const key=normalize(sub.name).replace(/\s*\((?:importata|copia|\d+)\)\s*$/,'');if(!subMap.has(key)){subMap.set(key,sub);continue}subMap.get(key).prompts.push(...sub.prompts);cat.subcategories.splice(cat.subcategories.indexOf(sub),1);mergedSubs++}for(const sub of cat.subcategories){const seen=new Map();for(const p of [...sub.prompts]){const key=normalize(p.title)+'|'+normalize(plain(p.description));if(!seen.has(key)){seen.set(key,p);continue}const keep=seen.get(key);keep.tags=[...new Set([...(keep.tags||[]),...(p.tags||[])])];keep.copyCount=(keep.copyCount||0)+(p.copyCount||0);keep.favorite=keep.favorite||p.favorite;sub.prompts.splice(sub.prompts.indexOf(p),1);mergedPrompts++}}}const ok=await this.confirmModal('Deduplica contenitori',`Trovate ${mergedCats} categorie duplicate, ${mergedSubs} sottocategorie duplicate e ${mergedPrompts} prompt esatti. Applicare l’unione?`,'Applica');if(!ok)return;this.snapshot();this.data=draft;await this.persist({backup:true});this.closeModal();this.render();Toast.show('Deduplica completata.','ok')}
  findDuplicates(){const all=this.allPrompts();const pairs=[];for(let i=0;i<all.length;i++){for(let j=i+1;j<all.length&&pairs.length<100;j++){const a=all[i],b=all[j];const exact=normalize(a.title)===normalize(b.title)&&normalize(plain(a.description))===normalize(plain(b.description));const score=Math.max(similarity(a.title,b.title),similarity(a.title+' '+plain(a.description).slice(0,500),b.title+' '+plain(b.description).slice(0,500)));if(exact||score>=.78)pairs.push({a,b,score:exact?1:score})}}const rows=pairs.map((p,i)=>`<tr><td>${i+1}</td><td><b>${escapeHtml(p.a.title)}</b><br><small>${escapeHtml(p.a.catName)} › ${escapeHtml(p.a.subName)}</small></td><td><b>${escapeHtml(p.b.title)}</b><br><small>${escapeHtml(p.b.catName)} › ${escapeHtml(p.b.subName)}</small></td><td>${Math.round(p.score*100)}%</td><td><button class="mini-btn" data-open-dup="${p.a.id}">Apri A</button> <button class="mini-btn" data-open-dup="${p.b.id}">Apri B</button></td></tr>`).join('');const modal=this.openModal({title:'Prompt duplicati o simili',subtitle:'Nessun prompt viene eliminato automaticamente.',body:`<div class="table-wrap"><table class="data-table"><thead><tr><th>#</th><th>Prompt A</th><th>Prompt B</th><th>Somiglianza</th><th></th></tr></thead><tbody>${rows||'<tr><td colspan="5">Nessun duplicato evidente.</td></tr>'}</tbody></table></div>`,large:true,buttons:[{label:'Chiudi',onClick:()=>this.closeModal()}]});modal.querySelectorAll('[data-open-dup]').forEach(btn=>btn.onclick=()=>{this.closeModal();this.openPrompt(btn.dataset.openDup)})}
  buildClassificationPlan(){return this.allPrompts().map(p=>{const entry={catName:p.catName,subName:p.subName,prompt:p};const result=TaxonomyEngine.classify(entry);return{promptId:p.id,title:p.title,current:`${p.catName} › ${p.subName}`,catName:p.catName,subName:p.subName,result,selected:true,proposedCat:result.catName,proposedSub:result.sub}})}
  openRecategorize(){this.closeModal();Loading.show();setTimeout(()=>{try{this.showClassificationPlan(this.buildClassificationPlan())}finally{Loading.hide()}},20)}
  showClassificationPlan(plan){
    let filter='changed',query='';
    const modal=this.openModal({title:'Riorganizzazione completa delle categorie',subtitle:'Tutti i prompt vengono distribuiti per argomento. Clienti, canali e strumenti restano tag ricercabili.',body:'<div id="classificationPlanBody"></div>',large:true,buttons:[{label:'Esporta anteprima CSV',onClick:()=>this.exportPlanCsv(plan)},{label:'Applica la nuova categorizzazione',className:'primary',onClick:()=>this.applyClassification(plan)},{label:'Annulla',onClick:()=>this.closeModal()}]});
    const bodyRoot=modal.querySelector('#classificationPlanBody');
    const draw=()=>{
      const changed=plan.filter(r=>normalize(r.current)!==normalize(`${r.proposedCat} › ${r.proposedSub}`)).length;
      const high=plan.filter(r=>r.result.level==='high').length;const medium=plan.filter(r=>r.result.level==='medium').length;const low=plan.filter(r=>r.result.level==='low').length;
      const visible=plan.map((r,i)=>({r,i})).filter(({r})=>(filter==='all'||(filter==='changed'&&normalize(r.current)!==normalize(`${r.proposedCat} › ${r.proposedSub}`))||(filter==='high'&&r.result.level==='high')||(filter==='medium'&&r.result.level!=='high'))&&(!query||normalize(r.title+' '+r.current+' '+r.proposedCat+' '+r.proposedSub).includes(normalize(query))));
      bodyRoot.innerHTML=`<div class="summary-grid"><div class="summary-box"><b>${plan.length}</b><span>Prompt analizzati</span></div><div class="summary-box"><b>${changed}</b><span>Da spostare</span></div><div class="summary-box"><b>${high}</b><span>Alta confidenza</span></div><div class="summary-box"><b>${medium}</b><span>Da controllare</span></div><div class="summary-box"><b>${low}</b><span>Confidenza bassa</span></div><div class="summary-box"><b>${TAXONOMY.length}</b><span>Categorie finali</span></div></div><div class="toolbar-row"><input id="planSearch" placeholder="Cerca prompt, origine o destinazione…" value="${escapeHtml(query)}"><button data-plan-filter="all">Tutti</button><button data-plan-filter="changed">Spostamenti</button><button data-plan-filter="high">Alta confidenza</button><button data-plan-filter="medium">Da controllare</button></div><div class="table-wrap"><table class="data-table"><thead><tr><th>Prompt</th><th>Origine</th><th>Categoria finale</th><th>Sottocategoria</th><th>Confidenza</th><th>Motivazioni</th></tr></thead><tbody>${visible.map(({r,i})=>{const tax=TAXONOMY.find(x=>x.name===r.proposedCat)||TAXONOMY[0];return`<tr><td><b>${escapeHtml(r.title)}</b></td><td>${escapeHtml(r.current)}</td><td><select data-plan-cat="${i}">${TAXONOMY.map(x=>`<option ${x.name===r.proposedCat?'selected':''}>${escapeHtml(x.name)}</option>`).join('')}</select></td><td><select data-plan-sub="${i}">${tax.subs.map(x=>`<option ${x===r.proposedSub?'selected':''}>${escapeHtml(x)}</option>`).join('')}</select></td><td><span class="confidence ${r.result.level}">${r.result.confidence}%</span></td><td>${escapeHtml(r.result.reasons.join(', ')||'classificazione per argomento e provenienza')}</td></tr>`}).join('')}</tbody></table></div>`;
      const search=bodyRoot.querySelector('#planSearch');search.oninput=e=>{query=e.target.value;draw()};
      bodyRoot.querySelectorAll('[data-plan-filter]').forEach(btn=>{btn.classList.toggle('active',btn.dataset.planFilter===filter);btn.onclick=()=>{filter=btn.dataset.planFilter;draw()}});
      bodyRoot.querySelectorAll('[data-plan-cat]').forEach(sel=>sel.onchange=()=>{const row=plan[+sel.dataset.planCat];row.proposedCat=sel.value;const tax=TAXONOMY.find(x=>x.name===sel.value)||TAXONOMY[0];row.proposedSub=tax.subs[0];draw()});
      bodyRoot.querySelectorAll('[data-plan-sub]').forEach(sel=>sel.onchange=()=>{plan[+sel.dataset.planSub].proposedSub=sel.value});
    };
    draw();
  }
  exportPlanCsv(plan){const header=['Prompt','Origine','Categoria proposta','Sottocategoria proposta','Confidenza','Motivazioni'];const rows=plan.map(r=>[r.title,r.current,r.proposedCat,r.proposedSub,r.result.confidence,(r.result.reasons||[]).join('; ')]);download('anteprima-categorizzazione-v31.1.csv',new Blob([[header,...rows].map(row=>row.map(csv).join(',')).join('\n')],{type:'text/csv;charset=utf-8'}))}
  splitLargeSubcategories(categories){for(const cat of categories){const result=[];for(const sub of cat.subcategories){if(sub.prompts.length<=50){result.push(sub);continue}const sorted=sub.prompts.slice().sort((a,b)=>a.title.localeCompare(b.title,'it'));for(let i=0;i<sorted.length;i+=35){const chunk=sorted.slice(i,i+35);const first=(normalize(chunk[0]?.title)[0]||'#').toUpperCase();const last=(normalize(chunk.at(-1)?.title)[0]||'#').toUpperCase();result.push({id:uid(),name:`${sub.name} · ${first}–${last}`,icon:sub.icon||'',prompts:chunk})}}cat.subcategories=result}}
  async applyClassification(plan){
    if(!plan.length){Toast.show('Nessun prompt da classificare.','err');return}
    const ok=await this.confirmModal('Applica la nuova categorizzazione',`Riorganizzare tutti i ${plan.length} prompt nelle ${TAXONOMY.length} categorie funzionali e creare un backup di rollback?`,'Applica');if(!ok)return;
    Loading.show();
    try{
      await this.db.put(DATA_STORE,'taxonomyRollbackV311',{data:this.data,recents:this.recents,ts:Date.now()});
      await this.db.saveBackup(this.data,'Prima della categorizzazione v31.1');
      const planMap=new Map(plan.map(r=>[r.promptId,r]));
      const newCats=TAXONOMY.map(t=>({id:uid(),name:t.name,icon:'',subcategories:t.subs.map(name=>({id:uid(),name,icon:'',prompts:[]}))}));
      const targetMap=new Map();newCats.forEach(c=>c.subcategories.forEach(sub=>targetMap.set(normalize(c.name)+'|'+normalize(sub.name),sub)));
      const entries=[];this.data.forEach(cat=>{if(this.isTrash(cat))return;(cat.subcategories||[]).forEach(sub=>(sub.prompts||[]).forEach(prompt=>entries.push({cat,sub,prompt})))});
      for(const entry of entries){
        const row=planMap.get(entry.prompt.id)||(()=>{const result=TaxonomyEngine.classify({catName:entry.cat.name,subName:entry.sub.name,prompt:entry.prompt});return{result,proposedCat:result.catName,proposedSub:result.sub}})();
        const tax=TAXONOMY.find(x=>x.name===row.proposedCat)||TAXONOMY.find(x=>x.key===row.result.key)||TAXONOMY[0];
        const subName=tax.subs.includes(row.proposedSub)?row.proposedSub:tax.subs[0];
        const target=targetMap.get(normalize(tax.name)+'|'+normalize(subName));
        const p=clone(entry.prompt);p.originCategory=p.originCategory||stripLeadingIcons(entry.cat.name);p.originSubcategory=p.originSubcategory||stripLeadingIcons(entry.sub.name);p.originHistory=Array.isArray(p.originHistory)?p.originHistory:[];p.originHistory.push({category:stripLeadingIcons(entry.cat.name),subcategory:stripLeadingIcons(entry.sub.name),at:Date.now()});p.classificationVersion=CLASSIFIER_VERSION;p.classificationScore=row.result.confidence;p.classificationReasons=row.result.reasons;p.classifiedAt=Date.now();p.tags=[...new Set([...(p.tags||[]),...(row.result.tags||[]),`origin:${slug(entry.cat.name)}`])];target.prompts.push(p);
      }
      newCats.forEach(cat=>cat.subcategories.forEach(sub=>{const seen=new Map();sub.prompts=sub.prompts.filter(p=>{const key=normalize(p.title)+'|'+normalize(plain(p.description));if(!seen.has(key)){seen.set(key,p);return true}const keep=seen.get(key);keep.tags=[...new Set([...(keep.tags||[]),...(p.tags||[])])];keep.copyCount=(keep.copyCount||0)+(p.copyCount||0);keep.favorite=keep.favorite||p.favorite;keep.pinned=keep.pinned||p.pinned;return false})}));
      newCats.forEach(cat=>cat.subcategories=cat.subcategories.filter(sub=>sub.prompts.length));
      const trash=this.data.find(c=>this.isTrash(c));if(trash){const copy=clone(trash);copy.name='Cestino';copy.icon='';copy.subcategories.forEach(s=>s.icon='');newCats.push(copy)}
      this.snapshot();this.data=newCats.filter(c=>this.isTrash(c)||this.countCategory(c)>0);this.state={...this.state,view:'dashboard',catId:null,subId:null,promptId:null};await this.persist();this.closeModal();this.render();this.exportClassificationReport(plan,plan.map(r=>r.promptId));Toast.show('Categorie riorganizzate: ogni prompt è stato assegnato alla propria area.','ok',5000);
    }finally{Loading.hide()}
  }
  exportClassificationReport(plan,ids){const set=new Set(ids);const rows=plan.filter(r=>set.has(r.promptId)).map(r=>[r.title,r.current,`${r.proposedCat} › ${r.proposedSub}`,r.result.confidence,(r.result.reasons||[]).join('; ')]);const text=[['Prompt','Origine','Destinazione','Confidenza','Motivazioni'],...rows].map(row=>row.map(csv).join(',')).join('\n');download('report-categorizzazione-v31.1.csv',new Blob([text],{type:'text/csv;charset=utf-8'}))}
  async rollbackTaxonomy(){const rollback=await this.db.get(DATA_STORE,'taxonomyRollbackV311',null)||await this.db.get(DATA_STORE,'taxonomyRollbackV31',null);if(!rollback?.data){Toast.show('Nessun rollback disponibile.','err');return}const ok=await this.confirmModal('Rollback tassonomia','Ripristinare i dati precedenti all’ultima ricategorizzazione?','Ripristina');if(!ok)return;this.snapshot();this.data=this.migrate(clone(rollback.data));this.recents=rollback.recents||[];await this.persist();this.closeModal();this.state.view='dashboard';this.render();Toast.show('Rollback completato.','ok')}
}

const app=new PromptStudioApp();window.PromptStudio=app;app.init();
})();
</script>
